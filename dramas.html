<head>

    const firebaseConfig = {

      storageBucket: "copa-ae771.firebasestorage.app",
      messagingSenderId: "1030169877544",
      appId: "1:1030169877544:web:66f6a79d398b8e50b0a91d"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    const dramasForcaElite = [
        {
            texto: "Um vídeo seu fazendo embaixadinhas com uma tampinha de garrafa na rua viralizou mundialmente e bateu 1 Bilhão de views!",

            A_msg: "LOUCURA MUNDIAL! Florentino Pérez adorou o vídeo e mandou te comprar na mesma hora!",
            A_efeitos: { forcarElite: true, fama: 20000000, emocao: "Focado 🧘" },
            B_texto: "Ignorar o vídeo e treinar.",
            B_msg: "Você perdeu a chance da sua vida de ir para um gigante, mas ganhou atributos.",
            B_efeitos: { ovr: 1, dri: 2, emocao: "Focado 🧘" },
            C_texto: "Vender o vídeo como NFT.",
            C_msg: "Você encheu os bolsos de dinheiro, mas a galera da internet te cancelou.",
            C_efeitos: { banco: 5000000, fama: -3000000, emocao: "Triste 😢" }
        },
        {
            texto: "A torcida organizada invadiu o CT do seu clube cobrando resultados após uma sequência de derrotas.",
            A_texto: "Chamar os líderes para a porrada.",
            A_msg: "PÉSSIMO! Você agrediu um torcedor. O clube rescindiu seu contrato e você saiu fugido do país.",
            A_efeitos: { rescisao: true, fama: -2000000, emocao: "Ressaca 🥴" },
            B_texto: "Dar a cara a tapa e prometer títulos.",
            B_msg: "Você botou moral. O elenco se inspirou e o entrosamento explodiu!",
            B_efeitos: { teamChemistry: 40, emocao: "Focado 🧘" },
            C_texto: "Se esconder no porta-malas do roupeiro.",
            C_msg: "Você foi filmado chorando no porta-malas. A mídia acabou com sua reputação e seu moral despencou.",
            C_efeitos: { fama: -5000000, teamChemistry: -30, emocao: "Triste 😢" }
        },
        {
            texto: "Você doou secretamente metade do seu salário para salvar o hospital infantil da cidade, mas a notícia vazou.",
            A_texto: "Dizer que não fez nada demais.",
            A_msg: "O mundo se apaixonou pela sua humildade. Um gigante europeu amou seu perfil de 'bom moço' e te comprou!",
            A_efeitos: { forcarElite: true, fama: 15000000, emocao: "Focado 🧘" },
            B_texto: "Exigir uma estátua na porta do hospital.",
            B_msg: "Que vexame... As pessoas viram que era só pelo ego. A fama até subiu, mas a torcida te detesta.",
            B_efeitos: { fama: 1000000, teamChemistry: -20, emocao: "Triste 😢" },
            C_texto: "Processar quem vazou a notícia.",
            C_msg: "Você arrumou briga com a mídia local por nada.",
            C_efeitos: { emocao: "Ressaca 🥴" }

        {
            texto: "Véspera de clássico. O principal jogador do time adversário provocou você e a sua mãe no Twitter.",

            A_efeitos: { rescisao: true, ovr: -3, emocao: "Triste 😢" },
            B_texto: "Responder no Twitter com memes.",
            B_msg: "A internet foi à loucura! Você engajou milhões e aumentou sua popularidade.",
            B_efeitos: { fama: 5000000, emocao: "Focado 🧘" },
            C_texto: "Responder em campo com Gols.",
            C_msg: "Você destruiu no clássico. Ganhou bônus de OVR!",
            C_efeitos: { ovr: 1, sho: 2, teamChemistry: 20, emocao: "Focado 🧘" }

    ];

    window.iniciarUpload = async function() {
        const status = document.getElementById("status");
        status.innerText = "Enviando novos dramas...";
        try {
            for (let d of dramasForcaElite) await addDoc(collection(db, "eventos"), d);
            status.innerHTML = "✅ Sucesso! Efeitos 'forcarElite' e 'rescisao' no banco de dados!";
        } catch (e) { status.innerText = "Erro: " + e; }
    }
</script>
</body>
</html>
