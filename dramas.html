        btn.innerText = "Enviando...";
        status.style.color = "white";
        status.innerText = "Iniciando conexão com Firebase...";

        let sucessoCount = 0;

        try {
            const eventosRef = collection(db, "eventos");
            
            for (let i = 0; i < novosDramas.length; i++) {
                await addDoc(eventosRef, novosDramas[i]);
                sucessoCount++;
                status.innerText = `Enviado ${sucessoCount} de ${novosDramas.length} dramas...`;
            }

            status.style.color = "#10b981"; // Verde
            status.innerText = "✅ SUCESSO! Todos os " + sucessoCount + " dramas foram enviados. Pode fechar esta página e jogar.";
            btn.innerText = "FINALIZADO";

        } catch (error) {
            console.error("Erro no upload:", error);
            status.style.color = "#ef4444"; // Vermelho
            status.innerText = "❌ ERRO: Verifique o console do navegador. Detalhe: " + error.message;
            btn.disabled = false;
            btn.innerText = "Tentar Novamente";
