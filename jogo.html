<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pênaltis: Herói ou Vilão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Oswald', sans-serif; }
        body { background-color: #1e293b; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
        
        .container { width: 100%; max-width: 500px; height: 100vh; max-height: 800px; position: relative; background: linear-gradient(to bottom, #38bdf8 0%, #38bdf8 40%, #22c55e 40%, #166534 100%); overflow: hidden; display: flex; flex-direction: column; }

        /* TELA DE SELEÇÃO */
        #selectionScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; text-align: center; }
        h1 { margin-bottom: 30px; font-size: 32px; color: #fbbf24; }
        .select-group { margin-bottom: 20px; width: 100%; }
        select { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; border: 2px solid #38bdf8; background: #1e293b; color: white; outline: none; }
        button.start-btn { background: #22c55e; color: white; border: none; padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 #166534; transition: all 0.1s; }
        button.start-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #166534; }

        /* PLACAR */
        .scoreboard { background: rgba(0,0,0,0.7); padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; border-bottom: 2px solid white; }
        .team-score { text-align: center; width: 40%; }
        .team-name { font-size: 16px; color: #cbd5e1; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score-number { font-size: 36px; font-weight: bold; color: #fbbf24; line-height: 1; }
        .turn-indicator { font-size: 14px; background: #ef4444; padding: 5px 10px; border-radius: 20px; font-weight: bold; text-align: center; }

        /* ÁREA DE JOGO */
        .game-area { flex: 1; position: relative; }
        
        /* O GOL */
        .goal { position: absolute; top: 20%; left: 10%; width: 80%; height: 35%; border: 8px solid white; border-bottom: none; display: flex; z-index: 1; background: rgba(255,255,255,0.1); }
        
        /* ZONAS DE CLIQUE */
        .zone { flex: 1; height: 100%; border-right: 1px dashed rgba(255,255,255,0.2); cursor: pointer; position: relative; display: flex; justify-content: center; align-items: center; }
        .zone:last-child { border-right: none; }
        .zone:hover { background: rgba(255,255,255,0.2); }
        .zone-label { font-size: 24px; opacity: 0.5; pointer-events: none; }

        /* GOLEIRO E BOLA */
        .goalkeeper { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); font-size: 80px; z-index: 3; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .ball { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); font-size: 50px; z-index: 5; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }

        /* MENSAGENS */
        .message-overlay { position: absolute; top: 40%; left: 0; width: 100%; text-align: center; font-size: 50px; font-weight: bold; text-transform: uppercase; z-index: 20; opacity: 0; text-shadow: 3px 3px 0 #000; transform: scale(0.5); pointer-events: none; transition: all 0.3s ease; }
        .show-msg { opacity: 1; transform: scale(1); }

    </style>
</head>
<body>

<div class="container">
    
    <!-- Tela Inicial -->
    <div id="selectionScreen">
        <h1>FUTEBOL PENALTY 3D</h1>
        <div class="select-group">
            <label>Seu Time:</label>
            <select id="playerTeam">
                <option value="Brasil">Brasil</option>
                <option value="Argentina">Argentina</option>
                <option value="França">França</option>
                <option value="Inglaterra">Inglaterra</option>
                <option value="Real Madrid">Real Madrid</option>
                <option value="Barcelona">Barcelona</option>
            </select>
        </div>
        <div class="select-group">
            <label>Adversário (Máquina):</label>
            <select id="aiTeam">
                <option value="Alemanha">Alemanha</option>
                <option value="Itália">Itália</option>
                <option value="Espanha">Espanha</option>
                <option value="Uruguai">Uruguai</option>
                <option value="Manchester City">Manchester City</option>
                <option value="Bayern">Bayern</option>
            </select>
        </div>
        <button class="start-btn" onclick="startGame()">BORA JOGAR</button>
    </div>

    <!-- Tela de Jogo -->
    <div class="scoreboard" id="gameScoreboard" style="display: none;">
        <div class="team-score">
            <div class="team-name" id="p1Name">Player</div>
            <div class="score-number" id="p1Score">0</div>
        </div>
        <div class="turn-indicator" id="turnInfo">Sua vez de CHUTAR</div>
        <div class="team-score">
            <div class="team-name" id="aiName">Máquina</div>
            <div class="score-number" id="aiScore">0</div>
        </div>
    </div>

    <div class="game-area" id="gameArea" style="display: none;">
        <div class="goal" id="goal">
            <div class="zone" onclick="playAction('left')"><span class="zone-label">👈</span></div>
            <div class="zone" onclick="playAction('center')"><span class="zone-label">☝️</span></div>
            <div class="zone" onclick="playAction('right')"><span class="zone-label">👉</span></div>
            <div class="goalkeeper" id="gk">🧤</div>
        </div>
        <div class="ball" id="ball">⚽</div>
        <div class="message-overlay" id="resultMsg"></div>
    </div>

</div>

<script>
    // Variáveis de Estado do Jogo
    let playerScore = 0;
    let aiScore = 0;
    let isPlayerTurnToShoot = true; 
    let actionInProgress = false;

    // Elementos DOM
    const gk = document.getElementById('gk');
    const ball = document.getElementById('ball');
    const resultMsg = document.getElementById('resultMsg');
    const turnInfo = document.getElementById('turnInfo');

    // Posições no eixo X para animação (Esquerda, Centro, Direita)
    const positions = {
        'left': '15%',
        'center': '50%',
        'right': '85%'
    };

    function startGame() {
        document.getElementById('p1Name').innerText = document.getElementById('playerTeam').value;
        document.getElementById('aiName').innerText = document.getElementById('aiTeam').value;
        
        document.getElementById('selectionScreen').style.display = 'none';
        document.getElementById('gameScoreboard').style.display = 'flex';
        document.getElementById('gameArea').style.display = 'block';
        
        updateUI();
    }

    function playAction(playerChoice) {
        if (actionInProgress) return;
        actionInProgress = true;

        // Máquina escolhe aleatoriamente entre esquerda, centro ou direita
        const options = ['left', 'center', 'right'];
        const aiChoice = options[Math.floor(Math.random() * options.length)];

        let ballTarget = '';
        let gkTarget = '';

        if (isPlayerTurnToShoot) {
            // Jogador Chuta, Máquina Defende
            ballTarget = playerChoice;
            gkTarget = aiChoice;
        } else {
            // Jogador Defende, Máquina Chuta
            gkTarget = playerChoice;
            ballTarget = aiChoice;
        }

        // Executa as animações
        animatePlay(ballTarget, gkTarget);
    }

    function animatePlay(ballTarget, gkTarget) {
        // Move o Goleiro
        gk.style.left = positions[gkTarget];
        
        // Efeito de queda do goleiro (rotação)
        if (gkTarget === 'left') gk.style.transform = 'translateX(-50%) rotate(-45deg)';
        else if (gkTarget === 'right') gk.style.transform = 'translateX(-50%) rotate(45deg)';
        else gk.style.transform = 'translateX(-50%) rotate(0deg)';

        // Move a Bola
        ball.style.left = positions[ballTarget];
        ball.style.top = '30%'; // Bola sobe em direção ao gol
        ball.style.transform = 'translateX(-50%) scale(0.4)'; // Bola diminui simulando profundidade

        // Checa o resultado após a animação (400ms)
        setTimeout(() => {
            const isGoal = (ballTarget !== gkTarget);
            showResult(isGoal);
        }, 400);
    }

    function showResult(isGoal) {
        if (isGoal) {
            resultMsg.innerText = "GOOOOOL! ⚽";
            resultMsg.style.color = "#4ade80";
            if (isPlayerTurnToShoot) playerScore++;
            else aiScore++;
        } else {
            resultMsg.innerText = "DEFENDEU! 🧤";
            resultMsg.style.color = "#f87171";
        }

        resultMsg.classList.add('show-msg');
        document.getElementById('p1Score').innerText = playerScore;
        document.getElementById('aiScore').innerText = aiScore;

        // Prepara próxima rodada após 1.5s
        setTimeout(() => {
            resetPositions();
            isPlayerTurnToShoot = !isPlayerTurnToShoot; // Alterna os turnos
            updateUI();
            actionInProgress = false;
        }, 1500);
    }

    function resetPositions() {
        resultMsg.classList.remove('show-msg');
        
        // Retira transição para voltar instantaneamente
        ball.style.transition = 'none';
        gk.style.transition = 'none';
        
        // Posição inicial
        ball.style.left = '50%';
        ball.style.top = 'auto';
        ball.style.bottom = '10%';
        ball.style.transform = 'translateX(-50%) scale(1)';
        
        gk.style.left = '50%';
        gk.style.transform = 'translateX(-50%) rotate(0deg)';

        // Devolve transição
        setTimeout(() => {
            ball.style.transition = 'all 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            gk.style.transition = 'all 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
        }, 50);
    }

    function updateUI() {
        if (isPlayerTurnToShoot) {
            turnInfo.innerText = "Sua vez de CHUTAR";
            turnInfo.style.background = "#22c55e"; // Verde
        } else {
            turnInfo.innerText = "Sua vez de DEFENDER";
            turnInfo.style.background = "#ef4444"; // Vermelho
        }
    }
</script>

</body>
</html>
