<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Manager PRO - Painel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap');

        :root {
            --bg-base: #0f172a; --bg-panel: #1e293b; --bg-card: #334155;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #3b82f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --border: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 4px; }

        /* ======== SIDEBAR ======== */
        .sidebar { width: 260px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 25px 20px; border-bottom: 1px solid var(--border); }
        .brand h1 { font-family: 'Oswald', sans-serif; font-size: 26px; color: var(--accent); text-transform: uppercase; }
        
        .nav-menu { flex-grow: 1; padding: 15px 0; overflow-y: auto; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 20px; color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .nav-item:hover { background: rgba(59, 130, 246, 0.1); color: var(--text-main); }
        .nav-item.active { background: rgba(59, 130, 246, 0.15); color: var(--accent); border-left-color: var(--accent); }
        
        /* ======== ÁREA PRINCIPAL ======== */
        .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
        
        .top-header { background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; flex-shrink: 0; }
        .club-info h2 { font-family: 'Oswald', sans-serif; font-size: 22px; text-transform: uppercase; margin-bottom: 4px; color: var(--warning); }
        .club-info p { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .header-stats { display: flex; gap: 15px; align-items: center; }
        .stat-badge { background: var(--bg-base); padding: 8px 12px; border-radius: 6px; font-size: 14px; font-weight: 700; border: 1px solid var(--border); color: var(--success); }
        
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* ======== ABAS ======== */
        .content-area { padding: 25px; overflow-y: auto; flex-grow: 1; }
        .tab-pane { display: none; animation: fadeIn 0.3s ease; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ======== PAINÉIS ======== */
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .panel { background: var(--bg-panel); border-radius: 10px; border: 1px solid var(--border); padding: 20px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; }
        .panel-title { font-family: 'Oswald', sans-serif; font-size: 18px; text-transform: uppercase; color: var(--text-main); }

        /* ======== TABELA DA LIGA ======== */
        .table-responsive { overflow-x: auto; max-height: 500px; }
        .league-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        .league-table th { position: sticky; top: 0; background: var(--bg-panel); text-align: left; padding: 12px 10px; color: var(--text-muted); border-bottom: 2px solid var(--border); z-index: 2; }
        .league-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
        .league-table tr:hover { background: rgba(255,255,255,0.03); }
        .col-center { text-align: center; }
        .row-highlight { background: rgba(59, 130, 246, 0.15); font-weight: bold; border-left: 4px solid var(--accent); }
        .zone-up { border-left: 3px solid var(--success); }
        .zone-down { border-left: 3px solid var(--danger); }

        /* ======== ELENCO ======== */
        .squad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .player-card { background: var(--bg-card); padding: 15px; border-radius: 8px; border-left: 4px solid var(--success); display: flex; justify-content: space-between; align-items: center; }
        .player-card.reserva { border-left-color: var(--text-muted); opacity: 0.8; }
        .player-info h4 { font-size: 14px; margin-bottom: 4px; }
        .player-info p { font-size: 11px; color: var(--text-muted); }
        .player-ovr { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: var(--warning); background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 6px; }

        #loader { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--accent); font-family: 'Oswald', sans-serif; font-size: 24px; }
    </style>
</head>
<body>

<div id="loader">Carregando Dados do Clube...</div>

<aside class="sidebar">
    <div class="brand">
        <h1 id="sidebar-club">Manager PRO</h1>
    </div>
    <nav class="nav-menu">
        <div class="nav-item active" onclick="switchTab('dashboard', this)">📊 Tabela da Liga</div>
        <div class="nav-item" onclick="switchTab('squad', this)">👕 Meu Elenco</div>
        <div class="nav-item" style="color: var(--text-muted); cursor: not-allowed;">🛒 Mercado (Em Breve)</div>
        <div class="nav-item" style="color: var(--text-muted); cursor: not-allowed;">⚽ Partida (Em Breve)</div>
    </nav>
</aside>

<div class="main-wrapper">
    <header class="top-header">
        <div class="club-info">
            <h2 id="ui-club-name">Buscando...</h2>
            <p id="ui-club-league">Aguarde...</p>
        </div>
        <div class="header-stats">
            <div class="stat-badge">💰 <span id="ui-balance">€ 0</span></div>
            <button class="btn-logout" onclick="fazerLogout()">Sair do Jogo</button>
        </div>
    </header>

    <main class="content-area">
        
        <!-- ABA: LIGA (CLASSIFICAÇÃO) -->
        <div id="tab-dashboard" class="tab-pane active">
            <div class="grid-layout">
                <div class="panel">
                    <div class="panel-header">
                        <h3 class="panel-title" id="ui-league-title">Classificação Geral</h3>
                    </div>
                    <div class="table-responsive">
                        <table class="league-table">
                            <thead>
                                <tr><th>#</th><th>Clube</th><th class="col-center">PTS</th><th class="col-center">J</th><th class="col-center">V</th><th class="col-center">E</th><th class="col-center">D</th><th class="col-center">GP</th><th class="col-center">GC</th><th class="col-center">SG</th></tr>
                            </thead>
                            <tbody id="ui-league-table">
                                <!-- Preenchido pelo JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ABA: ELENCO -->
        <div id="tab-squad" class="tab-pane">
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">Seu Plantel de Jogadores</h3>
                    <span style="font-size: 13px; color: var(--text-muted);">Total de Atletas: <strong id="ui-squad-count">0</strong></span>
                </div>
                <div class="squad-grid" id="ui-squad-grid">
                    <!-- Preenchido pelo JS -->
                </div>
            </div>
        </div>

    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDupdmlEYHgoCrYnBI0Py9hOWRFT1Ur_zk",
        authDomain: "copa-ae771.firebaseapp.com",
        projectId: "copa-ae771",
        appId: "1:1030169877544:web:66f6a79d398b8e50b0a91d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUID = null;
    let saveGame = null;

    // Monitora se o jogador está logado
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUID = user.uid;
            await carregarSaveDoBanco();
        } else {
            // Se não estiver logado, manda de volta para a tela de fundação
            window.location.href = "index.html"; 
        }
    });

    async function carregarSaveDoBanco() {
        const docSnap = await getDoc(doc(db, "sm_saves", currentUID));
        
        if (docSnap.exists()) {
            saveGame = docSnap.data();
            
            // Passo de Segurança: Verificar se a Liga já foi gerada neste Save.
            // Se não foi gerada ainda, o sistema cria os 19 rivais da última divisão agora mesmo.
            if (!saveGame.leagueData) {
                document.getElementById('loader').innerText = "Sorteando chaves e gerando rivais da liga...";
                saveGame.leagueData = gerarRivaisDaLiga(saveGame.clubName);
                // Salva a liga gerada de volta no Firebase
                await setDoc(doc(db, "sm_saves", currentUID), saveGame, { merge: true });
            }

            preencherInterface();
            document.getElementById('loader').style.display = 'none';
        } else {
            alert("Nenhum clube encontrado! Crie o seu clube primeiro.");
            window.location.href = "index.html";
        }
    }

    // Função que cria os 19 times falsos para preencher a tabela com você
    function gerarRivaisDaLiga(meuClubeNome) {
        const nomesRivais = [
            "Operário FC", "Desportiva", "Nacional", "Juventus", "Comercial", 
            "XV de Novembro", "Tupi", "Caxias", "Ypiranga", "Campinense", 
            "Treze", "Confiança", "Botafogo-B", "Tombense", "Volta Redonda", 
            "Ferroviário", "Sampaio Corrêa", "Paysandu", "Remo"
        ];
        
        let tabela = [];
        
        // Insere o seu time na tabela
        tabela.push({ id: "my_team", nome: meuClubeNome, p: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, isMe: true });
        
        // Insere os 19 rivais
        for(let i=0; i<19; i++) {
            tabela.push({ id: "cpu_"+i, nome: nomesRivais[i], p: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, isMe: false });
        }
        
        return tabela;
    }

    function preencherInterface() {
        // Preenche Cabeçalho
        document.getElementById('ui-club-name').innerText = saveGame.clubName;
        document.getElementById('sidebar-club').innerText = saveGame.clubName;
        document.getElementById('ui-club-league').innerText = `${saveGame.divisionName} - Treinador: ${saveGame.managerName}`;
        document.getElementById('ui-league-title').innerText = `Classificação - ${saveGame.divisionName}`;
        
        // Formata Moeda (€ 500k)
        let orcamento = saveGame.budget;
        let strOrc = orcamento >= 1000000 ? (orcamento/1000000).toFixed(1) + "M" : (orcamento/1000).toFixed(0) + "k";
        document.getElementById('ui-balance').innerText = `€ ${strOrc}`;

        // Preenche Tabela
        let htmlTabela = "";
        saveGame.leagueData.forEach((time, index) => {
            let classeLinha = time.isMe ? 'row-highlight' : '';
            let zona = index < 4 ? 'zone-up' : (index > 15 ? 'zone-down' : '');
            
            htmlTabela += `
            <tr class="${classeLinha}">
                <td class="${zona}">${index + 1}</td>
                <td>${time.isMe ? `<strong>${time.nome}</strong>` : time.nome}</td>
                <td class="col-center" style="color:var(--warning); font-weight:bold;">${time.p}</td>
                <td class="col-center">${time.j}</td>
                <td class="col-center">${time.v}</td>
                <td class="col-center">${time.e}</td>
                <td class="col-center">${time.d}</td>
                <td class="col-center">${time.gp}</td>
                <td class="col-center">${time.gc}</td>
                <td class="col-center" style="font-weight:bold;">${time.sg}</td>
            </tr>`;
        });
        document.getElementById('ui-league-table').innerHTML = htmlTabela;

        // Preenche Elenco
        document.getElementById('ui-squad-count').innerText = saveGame.squad.length;
        let htmlElenco = "";
        
        // Ordena para os Titulares aparecerem primeiro
        let elencoOrdenado = saveGame.squad.sort((a,b) => (b.isTitular ? 1 : 0) - (a.isTitular ? 1 : 0));
        
        elencoOrdenado.forEach(jog => {
            let statusCard = jog.isTitular ? '' : 'reserva';
            let statusTexto = jog.isTitular ? 'Titular' : 'Reserva';
            
            htmlElenco += `
            <div class="player-card ${statusCard}">
                <div class="player-info">
                    <h4>${jog.posicao} - ${jog.nome}</h4>
                    <p>${jog.idade} anos | Status: <strong>${statusTexto}</strong></p>
                </div>
                <div class="player-ovr">${jog.ovr}</div>
            </div>`;
        });
        document.getElementById('ui-squad-grid').innerHTML = htmlElenco;
    }

    // Funcionalidade das Abas e Logout
    window.switchTab = function(tabId, el) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('tab-' + tabId).classList.add('active');
    }

    window.fazerLogout = function() {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    }
</script>
</body>
</html>
