<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Simulator PRO</title>
    <style>
        body { margin: 0; background: #0b0f19; font-family: sans-serif; overflow: hidden; }
        
        /* PLACAR COMPACTO NO TOPO */
        #scoreboard { 
            position: absolute; top: 10px; width: 100%; display: flex; 
            justify-content: center; gap: 20px; color: white; 
            font-size: 18px; font-weight: bold; z-index: 10;
        }

        /* CAMPO COM PERSPECTIVA MELHOR */
        #gameArea { 
            width: 100vw; height: 100vh; position: relative; 
            background: linear-gradient(to bottom, #14532d, #064e3b);
            display: flex; justify-content: center; align-items: flex-end;
        }

        /* GOL COM VISÃO MELHORADA */
        #goal { 
            width: 70%; height: 35%; border: 8px solid white; 
            margin-bottom: 20px; position: relative;
        }

        /* GOLEIRO */
        #goalkeeper {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 50px; height: 70px; background: orange; transition: 0.3s;
        }

        /* BOLA */
        #ball {
            position: absolute; bottom: 5%; left: 50%; width: 30px; height: 30px;
            background: white; border-radius: 50%; transition: 0.5s;
        }
    </style>
</head>
<body>

<div id="scoreboard">
    <span>VOCÊ: <span id="scoreUser">0</span></span>
    <span>MÁQUINA: <span id="scoreAi">0</span></span>
</div>

<div id="gameArea">
    <div id="goal">
        <div id="goalkeeper"></div>
    </div>
    <div id="ball"></div>
</div>

<script>
    const gk = document.getElementById('goalkeeper');
    
    // Lógica para o goleiro se mover
    function moverGoleiro(direcao) {
        if(direcao === 'left') gk.style.left = '10%';
        else if(direcao === 'right') gk.style.left = '90%';
        else gk.style.left = '50%';
    }

    // Exemplo de interação (clique no gol para mover o goleiro)
    document.getElementById('goal').addEventListener('click', (e) => {
        const rect = e.target.getBoundingClientRect();
        const x = e.clientX - rect.left;
        if (x < rect.width / 3) moverGoleiro('left');
        else if (x > (rect.width / 3) * 2) moverGoleiro('right');
        else moverGoleiro('center');
    });
</script>

</body>
</html>
