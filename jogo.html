<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penalty Shooters - Edição Realista</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #05070f; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Ubuntu', sans-serif; }
        
        #gameContainer { position: relative; width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 4px solid #1e293b; border-radius: 8px; }
        canvas { width: 100%; height: 100%; display: block; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5, 7, 15, 0.95); color: white; z-index: 100; }
        h1 { font-size: 46px; color: #facc15; margin-bottom: 25px; text-shadow: 0 4px 12px rgba(0,0,0,0.8); letter-spacing: 2px; }
        .play-btn { background: linear-gradient(to bottom, #facc15, #eab308); color: #000; border: none; padding: 16px 50px; font-size: 24px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 6px 20px rgba(234,179,8,0.4); transition: 0.1s; text-transform: uppercase; }
        .play-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="startScreen" class="screen">
        <h1>PENALTY CHALLENGE</h1>
        <button class="play-btn" onclick="startGame()">Jogar</button>
    </div>

    <div id="endScreen" class="screen" style="display: none;">
        <h1 id="endTitle">Fim de Jogo</h1>
        <button class="play-btn" onclick="location.reload()">Jogar Novamente</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 850;
    canvas.height = 480;

    let gameState = 'START'; 
    let turn = 'PLAYER'; // PLAYER ou AI
    let score = { player: 0, ai: 0 };
    
    // Configurações do Cenário baseado nos prints
    const goal = { x: 175, y: 100, width: 500, height: 170 };
    const ballOrigin = { x: 425, y: 410 };
    let ball = { x: 425, y: 410, radius: 14, targetX: 0, targetY: 0, speed: 18, progress: 0 };
    
    let gk = { x: 425, y: 255, targetX: 425, targetY: 255, width: 45, height: 80, speed: 10, state: 'IDLE' };
    let player = { x: 330, y: 440, frame: 0 }; // Nosso batedor visto de costas

    // Elementos de Mira e Força (Idênticos aos prints)
    let arrowAngle = -0.6;
    let arrowDir = 0.025;
    let targetCircle = { x: 425, y: 185, dirX: 4, dirY: 2 };
    let powerBar = 0;
    let powerDir = 4.5;
    let resultText = '';
    let resultColor = '#fff';

    // Gerador de Torcida de fundo fixo para realismo
    const crowdParticles = [];
    for(let i=0; i<1200; i++) {
        crowdParticles.push({
            x: Math.random() * canvas.width,
            y: 40 + Math.random() * 60,
            color: ['#3b82f6', '#ef4444', '#eab308', '#10b981', '#a855f7', '#64748b'][Math.floor(Math.random()*6)]
        });
    }

    function startGame() {
        document.getElementById('startScreen').style.display = 'none';
        setupPlayerTurn();
        gameLoop();
    }

    function setupPlayerTurn() {
        turn = 'PLAYER';
        gameState = 'AIMING_ARROW';
        ball.x = ballOrigin.x; ball.y = ballOrigin.y; ball.progress = 0;
        gk.x = 425; gk.y = 255; gk.targetX = 425; gk.targetY = 255; gk.state = 'IDLE';
        targetCircle.x = 425; targetCircle.y = 185;
    }

    function setupAiTurn() {
        turn = 'AI';
        gameState = 'AI_SHOOTING';
        ball.x = ballOrigin.x; ball.y = ballOrigin.y; ball.progress = 0;
        gk.x = 425; gk.y = 255; gk.targetX = 425; gk.targetY = 255; gk.state = 'IDLE';
        
        setTimeout(() => {
            if (gameState !== 'AI_SHOOTING') return;
            // IA escolhe cantos difíceis
            const spots = [
                {x: 210 + Math.random()*80, y: 120 + Math.random()*80},
                {x: 560 + Math.random()*80, y: 120 + Math.random()*80},
                {x: 425 + (Math.random()*60 - 30), y: 130}
            ];
            const chosen = spots[Math.floor(Math.random() * spots.length)];
            ball.targetX = chosen.x;
            ball.targetY = chosen.y;
            ball.speed = 13 + Math.random() * 10;
            gameState = 'BALL_FLYING';

            if(gk.targetX === 425) {
                const moves = [250, 425, 600];
                gk.targetX = moves[Math.floor(Math.random()*3)];
                gk.targetY = 200; gk.state = 'DIVING';
            }
        }, 1600);
    }

    window.addEventListener('mousedown', () => {
        if (turn === 'PLAYER') {
            if (gameState === 'AIMING_ARROW') {
                gameState = 'AIMING_TARGET';
            } else if (gameState === 'AIMING_TARGET') {
                gameState = 'AIMING_POWER';
            } else if (gameState === 'AIMING_POWER') {
                // Chute disparado!
                ball.targetX = targetCircle.x;
                ball.targetY = targetCircle.y;
                ball.speed = 12 + (powerBar * 0.16); // Quanto mais força, mais rápido

                // Goleiro da máquina escolhe um lado para pular
                const aiMoves = [250, 425, 600];
                gk.targetX = aiMoves[Math.floor(Math.random() * aiMoves.length)];
                gk.targetY = 180 + Math.random() * 50;
                gk.state = 'DIVING';
                gameState = 'BALL_FLYING';
            }
        } else if (turn === 'AI' && gameState === 'AI_SHOOTING') {
            // Defesa do jogador usando cliques esquerdo/centro/direito do gol
            const rect = canvas.getBoundingClientRect();
            const mouseX = ((event.clientX - rect.left) / rect.width) * canvas.width;
            if (mouseX < 340) { gk.targetX = 250; gk.targetY = 200; }
            else if (mouseX > 510) { gk.targetX = 600; gk.targetY = 200; }
            else { gk.targetX = 425; gk.targetY = 220; }
            gk.state = 'DIVING';
        }
    });

    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        // Movimento do alvo e indicadores
        if (gameState === 'AIMING_ARROW') {
            arrowAngle += arrowDir;
            if (arrowAngle > 0.6 || arrowAngle < -0.6) arrowDir *= -1;
        }
        if (gameState === 'AIMING_TARGET') {
            targetCircle.x += targetCircle.dirX;
            targetCircle.y += targetCircle.dirY;
            if(targetCircle.x < goal.x + 30 || targetCircle.x > goal.x + goal.width - 30) targetCircle.dirX *= -1;
            if(targetCircle.y < goal.y + 30 || targetCircle.y > goal.y + goal.height - 30) targetCircle.dirY *= -1;
        }
        if (gameState === 'AIMING_POWER') {
            powerBar += powerDir;
            if (powerBar > 100 || powerBar < 0) powerDir *= -1;
        }

        // Movimento do Goleiro
        if (gk.state === 'DIVING') {
            gk.x += (gk.targetX - gk.x) * 0.16;
            gk.y += (gk.targetY - gk.y) * 0.16;
        }

        // Movimento da Bola
        if (gameState === 'BALL_FLYING') {
            ball.progress += 0.035;
            ball.x = ballOrigin.x + (ball.targetX - ballOrigin.x) * ball.progress;
            ball.y = ballOrigin.y + (ball.targetY - ballOrigin.y) * ball.progress;
            ball.radius = 15 - (7 * ball.progress);

            if (ball.progress >= 1) {
                gameState = 'RESULT';
                let distanceToGk = Math.hypot(ball.x - gk.x, ball.y - (gk.y - 25));
                let saveDistance = ball.speed > 22 ? 45 : 75; // Bola muito forte reduz o alcance do goleiro

                let isGoal = (ball.x >= goal.x && ball.x <= goal.x + goal.width && ball.y >= goal.y && ball.y <= goal.y + goal.height);

                if (isGoal) {
                    if (distanceToGk < saveDistance) {
                        resultText = "DEFENDEU!"; resultColor = "#facc15";
                    } else {
                        resultText = "GOOOOOL!"; resultColor = "#10b981";
                        if (turn === 'PLAYER') score.player++; else score.ai++;
                    }
                } else {
                    resultText = "PARA FORA!"; resultColor = "#ef4444";
                }

                setTimeout(() => {
                    if (score.player >= 5 || score.ai >= 5) endGame();
                    else if (turn === 'PLAYER') setupAiTurn(); else setupPlayerTurn();
                }, 2000);
            }
        }
    }

    function render() {
        ctx.clearRect(0,0,canvas.width,canvas.height);

        // 1. Céu da Noite e Arquibancada de Fundo
        ctx.fillStyle = '#090d16'; ctx.fillRect(0, 0, canvas.width, 100);
        ctx.fillStyle = '#111827'; ctx.fillRect(0, 40, canvas.width, 60);

        // Renderizar a Torcida Viva (Puntilhada como nas fotos)
        crowdParticles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 3, 3);
        });

        // Painel Publicitário (Muro do estádio)
        ctx.fillStyle = '#f97316'; ctx.fillRect(0, 100, canvas.width, 25);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Ubuntu';
        ctx.fillText("PENALTY CHALLENGE X    PENALTY SHOOTERS PRO    CHALLENGE", 40, 117);

        // 2. Gramado Realista com Faixas de Perspectiva (Listras Claras/Escuras)
        let totalStripes = 8;
        let currentY = 125;
        for (let i = 0; i < totalStripes; i++) {
            let stripeHeight = 15 + (i * 6);
            ctx.fillStyle = (i % 2 === 0) ? '#15803d' : '#166534';
            ctx.fillRect(0, currentY, canvas.width, stripeHeight);
            currentY += stripeHeight;
        }

        // Linhas Brancas do Campo
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 3;
        ctx.strokeRect(70, 270, 710, 210);

        // 3. O GOL (Traves grossas brancas e rede quadriculada)
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 7;
        ctx.strokeRect(goal.x, goal.y, goal.width, goal.height);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
        for(let x = goal.x; x < goal.x + goal.width; x += 14) {
            ctx.beginPath(); ctx.moveTo(x, goal.y); ctx.lineTo(x, goal.y + goal.height); ctx.stroke();
        }
        for(let y = goal.y; y < goal.y + goal.height; y += 14) {
            ctx.beginPath(); ctx.moveTo(goal.x, y); ctx.lineTo(goal.x + goal.width, y); ctx.stroke();
        }

        // 4. ELEMENTOS DE MIRA (Seta e Círculo Vermelho iguaizinhos aos prints)
        if (turn === 'PLAYER' && gameState === 'AIMING_ARROW') {
            ctx.save();
            ctx.translate(ballOrigin.x, ballOrigin.y); ctx.rotate(arrowAngle);
            ctx.fillStyle = '#eab308'; ctx.beginPath();
            ctx.moveTo(-10, -25); ctx.lineTo(10, -25); ctx.lineTo(5, -110); ctx.lineTo(-5, -110);
            ctx.closePath(); ctx.fill(); ctx.restore();
        }
        if (turn === 'PLAYER' && (gameState === 'AIMING_TARGET' || gameState === 'AIMING_POWER')) {
            // Desenha o Alvo Vermelho com bordas amarelas idêntico ao jogo real
            ctx.strokeStyle = '#eab308'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(targetCircle.x, targetCircle.y, 22, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = 'rgba(239, 68, 68, 0.7)';
            ctx.beginPath(); ctx.arc(targetCircle.x, targetCircle.y, 14, 0, Math.PI*2); ctx.fill();
        }

        // 5. GOLEIRO (Com luvas e uniforme detalhado de goleiro)
        ctx.fillStyle = turn === 'PLAYER' ? '#06b6d4' : '#ec4899';
        ctx.fillRect(gk.x - gk.width/2, gk.y - gk.height, gk.width, gk.height - 25); // Camisa
        ctx.fillStyle = '#111827'; ctx.fillRect(gk.x - gk.width/2, gk.y - 25, gk.width, 25); // Calção
        ctx.fillStyle = '#fbcfe8'; ctx.beginPath(); ctx.arc(gk.x, gk.y - gk.height - 12, 12, 0, Math.PI*2); ctx.fill(); // Rosto
        // Luvas Grandes de Goleiro
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(gk.x - gk.width - 8, gk.y - gk.height + 15, 15, 15);
        ctx.fillRect(gk.x + gk.width - 7, gk.y - gk.height + 15, 15, 15);

        // 6. JOGADOR DE COSTAS (Sempre visível na cobrança do jogador - Igual ao Print com Camisa número 3!)
        if (turn === 'PLAYER') {
            ctx.fillStyle = '#facc15'; // Camisa Listrada Amarela/Preta
            ctx.fillRect(player.x, player.y, 50, 40);
            ctx.fillStyle = '#000000'; // Listras pretas
            ctx.fillRect(player.x + 12, player.y, 8, 40);
            ctx.fillRect(player.x + 30, player.y, 8, 40);
            // Número 3 grande nas costas
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 22px Ubuntu';
            ctx.fillText("3", player.x + 18, player.y + 28);
            // Calção e Pernas
            ctx.fillStyle = '#000'; ctx.fillRect(player.x, player.y + 40, 50, 20);
            ctx.fillStyle = '#fbcfe8'; ctx.fillRect(player.x + 8, player.y + 60, 10, 25);
            ctx.fillRect(player.x + 32, player.y + 60, 10, 25);
        }

        // 7. A BOLA (Branca com gomos pretos estilizados)
        if (gameState !== 'START') {
            ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.beginPath();
            ctx.arc(ball.x, ball.y + 6, ball.radius, 0, Math.PI*2); ctx.fill(); // Sombra

            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            // Detalhes dos gomos internos da bola
            if(ball.radius > 8) {
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius*0.3, 0, Math.PI*2); ctx.fill();
            }
        }

        // BARRA DE FORÇA VERTICAL NO CANTO
        if (gameState === 'AIMING_POWER') {
            ctx.fillStyle = '#1e293b'; ctx.fillRect(35, 180, 25, 180);
            let pColor = '#10b981';
            if(powerBar > 65) pColor = '#facc15';
            if(powerBar > 85) pColor = '#ef4444';
            ctx.fillStyle = pColor; ctx.fillRect(35, 360, 25, -powerBar * 1.8);
        }

        // 8. PLACAR DO TORNEIO (Translúcido e elegante igual ao do print)
        ctx.fillStyle = 'rgba(15, 23, 42, 0.85)'; ctx.fillRect(canvas.width - 240, canvas.height - 95, 215, 75);
        ctx.lineWidth = 2; ctx.strokeStyle = '#eab308'; ctx.strokeRect(canvas.width - 240, canvas.height - 95, 215, 75);
        ctx.fillStyle = '#fff'; ctx.font = '15px Ubuntu';
        ctx.fillText("LEAO AZUL", canvas.width - 220, canvas.height - 65);
        ctx.fillText("DESCALCO", canvas.width - 220, canvas.height - 35);
        ctx.font = '20px Ubuntu'; ctx.fillStyle = '#facc15';
        ctx.fillText(score.player, canvas.width - 65, canvas.height - 63);
        ctx.fillText(score.ai, canvas.width - 65, canvas.height - 33);

        // Banner informativo Superior
        ctx.fillStyle = turn === 'PLAYER' ? '#1e3a8a' : '#c2410c';
        ctx.fillRect(0, 0, canvas.width, 40);
        ctx.fillStyle = '#fff'; ctx.font = '15px Ubuntu'; ctx.textAlign = 'center';
        ctx.fillText(turn === 'PLAYER' ? "SUA VEZ DE BATER! CLIQUE PARA FIXAR DIRECÃO, ALVO E FORÇA" : "SUA VEZ DE DEFENDER! CLIQUE EM UM DOS CANTO DO GOL PARA O GOLEIRO PULAR", canvas.width/2, 25);
        ctx.textAlign = 'left';

        // Telas de Gol / Defesa
        if (gameState === 'RESULT') {
            ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 200, canvas.width, 90);
            ctx.font = 'bold 42px Ubuntu'; ctx.fillStyle = resultColor; ctx.textAlign = 'center';
            ctx.fillText(resultText, canvas.width/2, 260); ctx.textAlign = 'left';
        }
    }

    function endGame() {
        gameState = 'START';
        document.getElementById('endScreen').style.display = 'flex';
        document.getElementById('endTitle').innerText = score.player > score.ai ? "Você Ganhou! 🏆" : "A Máquina Ganhou! 🤖";
    }
</script>

</body>
</html>
