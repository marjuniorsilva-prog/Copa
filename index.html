<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Carreira PRO</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: #1e293b; border-radius: 15px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .grid-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #334155; padding: 10px; text-align: center; border-radius: 8px; }
        .stat-num { font-size: 22px; font-weight: bold; color: #22c55e; }
        table { width: 100%; border-collapse: collapse; background: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #334155; }
        th { background: #1e293b; color: #94a3b8; }
        .btn { background: #ef4444; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #offers-area { display: none; background: #334155; padding: 15px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="grid-header">
        <h2 id="player-status">Iniciando Carreira...</h2>
        <div id="market-status"></div>
    </div>
    
    <div class="stats">
        <div class="stat-card">OVR<div class="stat-num" id="ovr">0</div></div>
        <div class="stat-card">PAC<div class="stat-num" id="pac">0</div></div>
        <div class="stat-card">SHO<div class="stat-num" id="sho">0</div></div>
        <div class="stat-card">PAS<div class="stat-num" id="pas">0</div></div>
        <div class="stat-card">DRI<div class="stat-num" id="dri">0</div></div>
        <div class="stat-card">PHY<div class="stat-num" id="phy">0</div></div>
    </div>

    <table>
        <thead><tr><th>Idd</th><th>Clube</th><th>🏟️</th><th>⚽</th><th>👟</th></tr></thead>
        <tbody id="history"></tbody>
    </table>

    <button class="btn" onclick="simular()">SIMULAR 3 ANOS</button>

    <div id="offers-area">
        <h3>Propostas recebidas:</h3>
        <div id="offer-list"></div>
    </div>
</div>

<script>
    let player = { age: 15, ovr: 65, pac: 60, sho: 60, pas: 60, dri: 60, phy: 60, club: "Base", history: [] };
    const clubs = [
        {name: "Real Madrid", tier: 1}, {name: "Man. City", tier: 1}, {name: "Bayern", tier: 1},
        {name: "Flamengo", tier: 3}, {name: "Boca Juniors", tier: 3}, {name: "River Plate", tier: 3},
        {name: "Al-Hilal", tier: 2}, {name: "Inter Miami", tier: 3}, {name: "Al Ahly", tier: 4}
    ];

    function simular() {
        if(player.age >= 39) { alert("Aposentadoria finalizada!"); return; }
        
        let cycleGoals = 0, cycleAssists = 0;
        for(let i=0; i<3; i++) {
            player.age++;
            // Lógica de evolução/declínio baseada na idade (Realismo puro)
            if(player.age < 28) {
                player.ovr += aleatorio(1, 3);
                player.pac += aleatorio(0, 2);
            } else if(player.age > 32) {
                player.pac -= aleatorio(1, 3);
                player.phy -= aleatorio(1, 2);
                player.ovr -= aleatorio(0, 1);
            }
            cycleGoals += Math.floor((player.ovr/100) * 45 * Math.random());
            cycleAssists += Math.floor((player.ovr/100) * 20 * Math.random());
        }

        // Atualiza tabela
        let html = `<tr><td>${player.age}</td><td>${player.club}</td><td>110</td><td>${cycleGoals}</td><td>${cycleAssists}</td></tr>`;
        document.getElementById('history').innerHTML = html + document.getElementById('history').innerHTML;
        
        updateStats();
        showOffers(cycleGoals);
    }

    function showOffers(goals) {
        let area = document.getElementById('offers-area');
        let list = document.getElementById('offer-list');
        list.innerHTML = "";
        
        // Regra: Quanto melhor o jogador (gols), mais ofertas (0 a 3)
        let num = goals > 25 ? aleatorio(1, 3) : aleatorio(0, 2);
        
        if(num === 0) { list.innerHTML = "<p>Nenhuma proposta nesta janela.</p>"; }
        else {
            for(let i=0; i<num; i++) {
                let c = clubs[aleatorio(0, clubs.length-1)];
                list.innerHTML += `<button class="btn" onclick="transfer('${c.name}')">${c.name} (€${aleatorio(10, 80)}M)</button><br>`;
            }
        }
        area.style.display = 'block';
    }

    function transfer(name) {
        player.club = name;
        document.getElementById('player-status').innerText = name;
        document.getElementById('offers-area').style.display = 'none';
    }

    function updateStats() {
        document.getElementById('ovr').innerText = player.ovr;
        document.getElementById('pac').innerText = player.pac;
        document.getElementById('sho').innerText = player.sho;
        document.getElementById('pas').innerText = player.pas;
        document.getElementById('dri').innerText = player.dri;
        document.getElementById('phy').innerText = player.phy;
    }

    function aleatorio(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
</script>
</body>
</html>
