<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carreira PRO Simulador</title>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: #1e293b; padding: 20px; border-radius: 12px; }
        .stats-bar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin: 20px 0; }
        .stat-item { background: #334155; padding: 10px; text-align: center; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: #0f172a; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }
        .btn-main { background: #ef4444; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
        .offer-btn { background: #22c55e; color: white; border: none; padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="carreira-title">Carreira: Carregando...</h2>
    <div class="stats-bar" id="stats-ui">
        <!-- OVR, PAC, SHO, PAS, DRI, DEF, PHY -->
    </div>

    <table>
        <thead><tr><th>Idd</th><th>Clube</th><th>🏟️</th><th>⚽</th><th>👟</th><th>Glórias</th></tr></thead>
        <tbody id="history-body"></tbody>
    </table>

    <button class="btn-main" onclick="simularCiclo()">SIMULAR 3 ANOS ⏩</button>
    
    <div id="market-area" style="display:none; margin-top:20px;">
        <h3>Escolha seu destino:</h3>
        <div id="offer-list"></div>
    </div>
</div>

<script>
    let p = { age: 15, ovr: 70, pac: 70, sho: 70, pas: 70, dri: 70, def: 60, phy: 70, club: "Real Madrid", stats: {g:0, a:0} };
    const clubs = ["Man City", "Flamengo", "PSG", "Al-Nassr", "Barcelona", "Liverpool", "Juventus"];

    function simularCiclo() {
        if(p.age >= 39) return;
        p.age += 3;

        // Lógica de performance e títulos
        let jogos = 100;
        let gols = Math.floor((p.ovr/80) * 45 + aleatorio(-10, 20));
        let pass = Math.floor((p.pas/80) * 15 + aleatorio(-5, 5));
        p.stats.g += gols; p.stats.a += pass;

        // Lógica de Títulos
        let glorias = [];
        if(gols > 30) glorias.push("Liga");
        if(gols > 50) glorias.push("Champions");
        if(p.age % 4 === 0 && p.ovr > 85) glorias.push("🏆 Copa do Mundo");
        
        let gloriaText = glorias.join(" + ");

        let tbody = document.getElementById('history-body');
        tbody.innerHTML = `<tr><td>${p.age}</td><td>${p.club}</td><td>${jogos}</td><td>${gols}</td><td>${pass}</td><td>${gloriaText}</td></tr>` + tbody.innerHTML;

        // Atualizar Stats
        p.ovr += aleatorio(-1, 2);
        updateUI();
        mostrarOfertas();
    }

    function mostrarOfertas() {
        let area = document.getElementById('market-area');
        let list = document.getElementById('offer-list');
        list.innerHTML = "";
        let num = aleatorio(1, 3);
        
        for(let i=0; i<num; i++) {
            let c = clubs[aleatorio(0, clubs.length-1)];
            let val = aleatorio(50, 200);
            list.innerHTML += `<button class='offer-btn' onclick="mudarClube('${c}')">${c} (€${val}m)</button>`;
        }
        area.style.display = 'block';
    }

    function mudarClube(nome) {
        p.club = nome;
        document.getElementById('carreira-title').innerText = "Carreira: " + nome;
        document.getElementById('market-area').style.display = 'none';
    }

    function updateUI() {
        document.getElementById('carreira-title').innerText = "Carreira: " + p.club;
        document.getElementById('stats-ui').innerHTML = `
            <div class='stat-item'>OVR<br>${p.ovr}</div><div class='stat-item'>PAC<br>${p.pac}</div>
            <div class='stat-item'>SHO<br>${p.sho}</div><div class='stat-item'>PAS<br>${p.pas}</div>
            <div class='stat-item'>DRI<br>${p.dri}</div><div class='stat-item'>DEF<br>${p.def}</div>
            <div class='stat-item'>PHY<br>${p.phy}</div>
        `;
    }

    function aleatorio(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    updateUI();
</script>
</body>
</html>
