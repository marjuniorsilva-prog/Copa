<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Carreira 2.0</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2a2a2a;
            --primary: #00ff88;
            --text-light: #ffffff;
            --gold: #ffd700;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1, h2, h3 { text-align: center; margin-top: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 15px; }
        .stat-box { background: #4a148c; padding: 10px 5px; border-radius: 5px; text-align: center; font-size: 14px; font-weight: bold; color: white; }
        .stat-value { font-size: 20px; background: white; color: black; border-radius: 3px; margin-top: 5px; }
        
        .trophy-cabinet { background: #f4f4f4; color: black; display: flex; justify-content: space-around; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 15px; }
        .trophy-item { text-align: center; font-size: 18px; }
        
        /* TABELA DE HISTÓRICO (Estilo do Print) */
        .history-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #88c999; color: black; font-weight: bold; text-align: center; border-radius: 8px; overflow: hidden; }
        .history-table th { background: #008f39; color: white; padding: 10px; }
        .history-table td { padding: 8px; border-bottom: 1px solid #6eb881; }
        .row-age { background: #4a148c; color: white; font-size: 18px; }
        .row-club { display: flex; align-items: center; justify-content: center; gap: 5px; background: white; color: black; padding: 5px; border-radius: 4px; font-size: 12px;}
        
        .btn { background: #ff0055; color: white; border: none; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .btn-market { background: #0055ff; }
        .btn-stay { background: #555; }
        
        #transfer-market { display: none; background: #111; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <div id="start-screen">
        <h1>Minha Carreira Futebol ⚽</h1>
        <button class="btn" onclick="iniciarCarreira()">Revelar Jogador na América do Sul</button>
    </div>

    <div id="main-screen" style="display: none;">
        <h2 id="player-club-title" style="color: var(--primary);">Clube Atual</h2>

        <div class="trophy-cabinet">
            <div class="trophy-item">🏆 <br><span id="t-liga">0</span></div>
            <div class="trophy-item">🌎 <br><span id="t-cont">0</span></div>
            <div class="trophy-item">🥇 <br><span id="t-copa">0</span></div>
            <div class="trophy-item">✨ <br><span id="t-bdor">0</span></div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">OVR<div class="stat-value" id="stat-ovr">70</div></div>
            <div class="stat-box" style="background:#900">PAC<div class="stat-value" id="stat-pac">70</div></div>
            <div class="stat-box" style="background:#900">SHO<div class="stat-value" id="stat-sho">70</div></div>
            <div class="stat-box" style="background:#900">PAS<div class="stat-value" id="stat-pas">70</div></div>
            <div class="stat-box" style="background:#900">DRI<div class="stat-value" id="stat-dri">70</div></div>
            <div class="stat-box" style="background:#900">PHY<div class="stat-value" id="stat-phy">70</div></div>
        </div>

        <!-- TABELA ESTILO PRINT -->
        <table class="history-table" id="history-table">
            <thead>
                <tr>
                    <th style="width: 15%;">Idade</th>
                    <th style="width: 40%;">Clube</th>
                    <th title="Jogos">🏟️</th>
                    <th title="Gols">⚽</th>
                    <th title="Assistências">👟</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <!-- Linhas geradas via JS -->
            </tbody>
        </table>

        <div id="action-area">
            <button class="btn" onclick="simularTemporada()">Jogar Próxima Temporada</button>
        </div>

        <div id="transfer-market">
            <h3 style="color: var(--primary);">MERCADO DE TRANSFERÊNCIAS ✈️</h3>
            <div id="offers-list"></div>
            <button class="btn btn-stay" onclick="rejeitarOfertas()">Recusar e Ficar no Clube</button>
        </div>
    </div>
</div>

<script>
    // --- BANCO DE CLUBES AMPLIADO ---
    const clubes = [
        // América do Sul (Revelação / Fim de Carreira)
        { nome: "Flamengo", pais: "🇧🇷", tier: 3 }, { nome: "Palmeiras", pais: "🇧🇷", tier: 3 }, 
        { nome: "Boca Juniors", pais: "🇦🇷", tier: 3 }, { nome: "River Plate", pais: "🇦🇷", tier: 3 },
        { nome: "Atlético Nacional", pais: "🇨🇴", tier: 4 }, { nome: "Peñarol", pais: "🇺🇾", tier: 4 },
        
        // Inglaterra (Premier League - Alta exigência)
        { nome: "Manchester City", pais: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", tier: 1 }, { nome: "Liverpool", pais: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", tier: 1 },
        { nome: "Chelsea", pais: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", tier: 2 }, { nome: "Aston Villa", pais: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", tier: 2 },
        
        // Europa Geral (Gigantes)
        { nome: "Real Madrid", pais: "🇪🇸", tier: 1 }, { nome: "Barcelona", pais: "🇪🇸", tier: 1 },
        { nome: "Bayern Munique", pais: "🇩🇪", tier: 1 }, { nome: "Dortmund", pais: "🇩🇪", tier: 2 },
        { nome: "Juventus", pais: "🇮🇹", tier: 2 }, { nome: "Milan", pais: "🇮🇹", tier: 2 },
        
        // Mundo Árabe (Caminhão de Dinheiro)
        { nome: "Al-Nassr", pais: "🇸🇦", tier: "Arabia" }, { nome: "Al-Hilal", pais: "🇸🇦", tier: "Arabia" },
        
        // O Meme Lendário
        { nome: "Shamrock Rovers", pais: "🇮🇪", tier: "Meme" }
    ];

    let jogador = {
        idade: 17, clubeAtual: null,
        atributos: { ovr: 0, pac: 0, sho: 0, pas: 0, dri: 0, phy: 0 },
        titulos: { ligas: 0, continentais: 0, copasMundo: 0, bolasDeOuro: 0 }
    };

    function aleatorio(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function iniciarCarreira() {
        let base = aleatorio(65, 78); // Pode nascer pé rapado ou craque
        jogador.atributos = {
            ovr: base, pac: base + aleatorio(0, 15), sho: base + aleatorio(-10, 15),
            pas: base + aleatorio(-10, 10), dri: base + aleatorio(-5, 15), phy: base + aleatorio(-15, 10)
        };
        recalcularOVR();

        // Sorteia time sulamericano
        let timesSA = clubes.filter(c => c.tier === 3 || c.tier === 4);
        jogador.clubeAtual = timesSA[aleatorio(0, timesSA.length - 1)];

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        atualizarTela();
    }

    function recalcularOVR() {
        let a = jogador.atributos;
        a.ovr = Math.floor((a.pac * 0.2) + (a.sho * 0.35) + (a.pas * 0.15) + (a.dri * 0.2) + (a.phy * 0.1));
        for(let key in a) { if(a[key] > 99) a[key] = 99; if(a[key] < 30) a[key] = 30; }
    }

    function simularTemporada() {
        let attr = jogador.atributos;
        
        // 1. Jogos no Ano (Físico manda aqui)
        let maxJogos = 55;
        let jogosPerdidos = 0;
        if (attr.phy < 75 && Math.random() > 0.3) jogosPerdidos = aleatorio(5, 30); // Lesão!
        let jogosJogados = maxJogos - jogosPerdidos;

        // 2. Gols (Média por jogo baseada em Chute, Ritmo e Drible)
        let chanceGol = ((attr.sho * 0.6) + (attr.pac * 0.2) + (attr.dri * 0.2)) / 100;
        let gols = Math.floor(jogosJogados * chanceGol * (Math.random() * 0.5 + 0.6));
        
        // Dificuldade da Liga
        if (jogador.clubeAtual.tier === 1) gols = Math.floor(gols * 0.85); // Mais difícil
        if (jogador.clubeAtual.tier === "Arabia") gols = Math.floor(gols * 1.4); // Faz a festa

        // 3. Assistências (Baseado no Passe)
        let chanceAssist = (attr.pas / 100) * 0.4;
        let assists = Math.floor(jogosJogados * chanceAssist * (Math.random() * 0.5 + 0.5));

        // 4. Sorteio de Títulos
        let forcaEquipe = (typeof jogador.clubeAtual.tier === 'number' ? (5 - jogador.clubeAtual.tier) * 20 : 70) + attr.ovr;
        let tLiga = false, tCont = false, tCopa = false, tBdor = false;

        if (Math.random() * 200 < forcaEquipe) { tLiga = true; jogador.titulos.ligas++; }
        if (jogador.clubeAtual.tier <= 2 && Math.random() * 250 < forcaEquipe) { tCont = true; jogador.titulos.continentais++; }
        if (jogador.idade % 4 === 0 && Math.random() > 0.9 && attr.ovr > 84) { tCopa = true; jogador.titulos.copasMundo++; }
        if (gols > 38 && attr.ovr >= 90 && (tCont || tCopa)) { tBdor = true; jogador.titulos.bolasDeOuro++; }

        // Adicionar Linha na Tabela
        let tabela = document.getElementById('history-body');
        let linha = `<tr>
            <td class="row-age">${jogador.idade}</td>
            <td><div class="row-club">${jogador.clubeAtual.nome} ${jogador.clubeAtual.pais}</div></td>
            <td>${jogosJogados}</td>
            <td>${gols}</td>
            <td>${assists}</td>
        </tr>`;
        tabela.innerHTML = linha + tabela.innerHTML;

        // Evolução de Idade
        if (jogador.idade < 28) {
            attr.pac += aleatorio(0, 2); attr.sho += aleatorio(1, 4); attr.pas += aleatorio(1, 3);
            attr.dri += aleatorio(1, 3); attr.phy += aleatorio(0, 2);
        } else if (jogador.idade > 32) {
            attr.pac -= aleatorio(1, 4); attr.phy -= aleatorio(1, 3); attr.sho -= aleatorio(0, 1);
        }
        recalcularOVR();
        jogador.idade++;
        atualizarTela();

        // Aposentadoria
        if (jogador.idade > aleatorio(36, 40) || attr.ovr < 50) {
            document.getElementById('action-area').innerHTML = `<h2 style='color:red;'>APOSENTADO!</h2><button class='btn' onclick='location.reload()'>Nova Carreira</button>`;
            return;
        }

        abrirMercado();
    }

    function abrirMercado() {
        document.getElementById('action-area').style.display = 'none';
        let market = document.getElementById('transfer-market');
        let offersList = document.getElementById('offers-list');
        offersList.innerHTML = '';
        
        let ovr = jogador.atributos.ovr;
        let propostas = [];

        clubes.forEach(c => {
            if (c.nome === jogador.clubeAtual.nome) return;
            let interessa = false;
            
            if (ovr >= 88 && c.tier === 1) interessa = true;
            if (ovr >= 80 && ovr < 90 && c.tier === 2) interessa = true;
            if (ovr >= 70 && c.tier === 3) interessa = true;
            if (ovr < 75 && c.tier === 4) interessa = true;
            
            // Fator Arábia e Meme
            if (jogador.idade >= 30 && c.tier === "Arabia") interessa = true;
            if (Math.random() > 0.95 && c.tier === "Meme") interessa = true; // 5% chance do Shamrock Rovers agir!

            if (interessa && Math.random() > 0.6) propostas.push(c);
        });

        propostas = propostas.sort(() => 0.5 - Math.random()).slice(0, 3);

        if (propostas.length === 0) { fecharMercado(); return; }

        market.style.display = 'block';
        window.propostasAtuais = propostas;

        propostas.forEach((clube, index) => {
            let valor = Math.floor((ovr * ovr) / 100) + aleatorio(10, 40);
            if(clube.tier === "Arabia" || clube.tier === "Meme") valor *= 2; // Inflaciona o valor

            offersList.innerHTML += `<button class="btn btn-market" onclick="aceitarTransferencia(${index})">
                Assinar com ${clube.nome} ${clube.pais} (€${valor}M)
            </button>`;
        });
    }

    function aceitarTransferencia(index) {
        jogador.clubeAtual = window.propostasAtuais[index];
        fecharMercado();
    }

    function rejeitarOfertas() { fecharMercado(); }

    function fecharMercado() {
        document.getElementById('transfer-market').style.display = 'none';
        document.getElementById('action-area').style.display = 'block';
        atualizarTela();
    }

    function atualizarTela() {
        document.getElementById('player-club-title').innerText = jogador.clubeAtual.nome + " " + jogador.clubeAtual.pais;
        
        let a = jogador.atributos;
        document.getElementById('stat-ovr').innerText = a.ovr;
        document.getElementById('stat-pac').innerText = a.pac;
        document.getElementById('stat-sho').innerText = a.sho;
        document.getElementById('stat-pas').innerText = a.pas;
        document.getElementById('stat-dri').innerText = a.dri;
        document.getElementById('stat-phy').innerText = a.phy;

        document.getElementById('t-liga').innerText = jogador.titulos.ligas;
        document.getElementById('t-cont').innerText = jogador.titulos.continentais;
        document.getElementById('t-copa').innerText = jogador.titulos.copasMundo;
        document.getElementById('t-bdor').innerText = jogador.titulos.bolasDeOuro;
    }
</script>

</body>
</html>
