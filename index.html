<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Carreira - Estável</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: #1e293b; border-radius: 15px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #0f172a; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: center; }
        .btn { background: #ef4444; color: white; border: none; padding: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        .offer-btn { background: #22c55e; margin: 5px; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>Carreira: <span id="club-name">Real Madrid</span></h2>
    <div id="stats-display">OVR: 70 | Gols: 0</div>
    
    <table>
        <thead><tr><th>Idd</th><th>Clube</th><th>🏟️</th><th>⚽</th><th>👟</th><th>Glórias</th></tr></thead>
        <tbody id="history-body"></tbody>
    </table>

    <button class="btn" onclick="simular()">SIMULAR 3 ANOS ⏩</button>
    <div id="offers-area" style="display:none; margin-top:20px;">
        <h3>Escolha seu destino:</h3>
        <div id="offer-list"></div>
    </div>
</div>

<script>
    let p = { age: 15, ovr: 70, club: "Real Madrid", history: [] };
    const allClubs = ["Chelsea", "Juventus", "Flamengo", "Man City", "River Plate", "PSG", "Al-Nassr"];

    function simular() {
        if(p.age >= 39) { alert("Aposentado!"); return; }
        
        p.age += 3;
        // Evolução dinâmica
        if(p.age < 30) p.ovr += aleatorio(1, 4);
        else p.ovr -= 1;
        
        let gols = Math.floor((p.ovr/80) * 40 + aleatorio(-5, 20));
        let assists = Math.floor((p.ovr/90) * 15);
        
        // Títulos (Realismo)
        let titulo = "";
        if(gols > 30) { p.titles++; titulo = "🏆 Liga"; }
        if(gols > 50) { p.titles += 2; titulo = "🏆 Liga + 🌎 Champions"; }

        // Renderizar
        let tbody = document.getElementById('history-body');
        tbody.innerHTML = `<tr><td>${p.age}</td><td>${p.club}</td><td>100</td><td>${gols}</td><td>${assists}</td><td>${titulo}</td></tr>` + tbody.innerHTML;
        
        document.getElementById('stats-display').innerText = `OVR: ${p.ovr} | Gols: ${gols}`;
        gerarOfertas();
    }

    function gerarOfertas() {
        let area = document.getElementById('offers-area');
        let list = document.getElementById('offer-list');
        list.innerHTML = "";
        
        // Gera de 0 a 3 ofertas
        let num = aleatorio(0, 3);
        
        if(num === 0) {
            area.style.display = 'block';
            list.innerHTML = "<p>Nenhuma oferta nesta janela. Permanecendo no clube.</p>";
            setTimeout(() => { area.style.display = 'none'; }, 2000);
        } else {
            area.style.display = 'block';
            for(let i=0; i<num; i++) {
                let c = allClubs[aleatorio(0, allClubs.length-1)];
                list.innerHTML += `<button class="btn offer-btn" onclick="mudarClube('${c}')">${c}</button>`;
            }
        }
    }

    function mudarClube(nome) {
        p.club = nome;
        document.getElementById('club-name').innerText = nome;
        document.getElementById('offers-area').style.display = 'none';
    }

    function aleatorio(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
</script>
</body>
</html>
