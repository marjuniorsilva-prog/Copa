<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDupdmlEYHgoCrYnBI0Py9hOWRFT1Ur_zk",
      authDomain: "copa-ae771.firebaseapp.com",
      projectId: "copa-ae771",
      storageBucket: "copa-ae771.firebasestorage.app",
      messagingSenderId: "1030169877544",
      appId: "1:1030169877544:web:66f6a79d398b8e50b0a91d"
    };

    let db;
    let eliteClubs = [], tierPrata = [], tierBronze = [];
    let dramasDisponiveis = [];

    async function inicializarJogo() {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);

        // 1. Carrega Times do Firebase
        const timesSnap = await getDocs(collection(db, "times"));
        timesSnap.forEach(doc => {
            let t = doc.data();
            if(t.categoria === "Elite") eliteClubs.push(t.nome);
            else if(t.categoria === "Prata") tierPrata.push(t.nome);
            else tierBronze.push(t.nome);
        });

        // 2. Carrega Dramas do Firebase
        const dramasSnap = await getDocs(collection(db, "eventos"));
        dramasSnap.forEach(doc => {
            dramasDisponiveis.push(doc.data());
        });
        
        console.log("Sistema Cloud carregado! Times:", eliteClubs.length, "Dramas:", dramasDisponiveis.length);
    }

    inicializarJogo();

    // ... [Mantenha aqui as suas funções de lógica do jogo] ...

</script>
