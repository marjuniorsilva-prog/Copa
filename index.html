<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDupdmlEYHgoCrYnBI0Py9hOWRFT1Ur_zk",
        authDomain: "copa-ae771.firebaseapp.com",
        databaseURL: "https://copa-ae771-default-rtdb.firebaseio.com",
        projectId: "copa-ae771",
        storageBucket: "copa-ae771.firebasestorage.app",
        messagingSenderId: "1030169877544",
        appId: "1:1030169877544:web:66f6a79d398b8e50b0a91d"
    };

    // Usamos 'var' para que o código antigo abaixo consiga enxergar essas listas
    window.eliteClubs = [];
    window.tierPrata = [];
    window.tierBronze = [];
    window.dramasDisponiveis = [];

    async function iniciarSistema() {
        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // Carrega Times
            const timesSnap = await getDocs(collection(db, "times"));
            timesSnap.forEach(doc => {
                let t = doc.data();
                if(t.categoria === "Elite") window.eliteClubs.push(t.nome);
                else if(t.categoria === "Prata") window.tierPrata.push(t.nome);
                else window.tierBronze.push(t.nome);
            });

            // Carrega Dramas
            const dramasSnap = await getDocs(collection(db, "eventos"));
            dramasSnap.forEach(doc => {
                window.dramasDisponiveis.push(doc.data());
            });
            
            console.log("Sistema Cloud carregado!");
            document.getElementById('btn-main').innerText = "INICIAR CARREIRA";
            document.getElementById('btn-main').disabled = false;
        } catch (e) {
            console.error("Erro na nuvem:", e);
        }
    }

    // Bloqueia o botão de iniciar até os dados chegarem
    document.getElementById('btn-main').innerText = "CARREGANDO DADOS...";
    document.getElementById('btn-main').disabled = true;

    iniciarSistema();
</script>
