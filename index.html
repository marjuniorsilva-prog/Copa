<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalador de Times no Firebase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #1e293b; font-size: 24px; }
        p { color: #475569; font-size: 14px; margin-bottom: 20px; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #status {
            margin-top: 20px;
            font-weight: bold;
            font-size: 14px;
            color: #b91c1c;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚽ Instalador de Times</h1>
        <p>Conectando ao Firebase para gravar os times das 7 maiores ligas.</p>
        <button id="btn-instalar">🚀 CLIQUE AQUI PARA INSTALAR</button>
        <div id="status"></div>
    </div>

    <script type="module">
        // Usando uma versão extremamente estável do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDupdmlEYHgoCrYnBI0Py9hOWRFT1Ur_zk",
            authDomain: "copa-ae771.firebaseapp.com",
            projectId: "copa-ae771",
            storageBucket: "copa-ae771.firebasestorage.app",
            messagingSenderId: "1030169877544",
            appId: "1:1030169877544:web:66f6a79d398b8e50b0a91d"
        };

        let app, db;
        const status = document.getElementById("status");
        const btn = document.getElementById("btn-instalar");

        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (error) {
            status.style.color = "red";
            status.innerText = "Erro ao iniciar o Firebase: " + error.message;
            btn.disabled = true;
        }

        const listaTimes = [
            // Premier League
            { id: "eng_mancity", nome: "Manchester City 🏴󠁧󠁢󠁥󠁮󠁧󠁿", categoria: "Elite" },
            { id: "eng_arsenal", nome: "Arsenal 🏴󠁧󠁢󠁥󠁮󠁧󠁿", categoria: "Elite" },
            { id: "eng_astonvilla", nome: "Aston Villa 🏴󠁧󠁢󠁥󠁮󠁧󠁿", categoria: "Prata" },
            { id: "eng_crystalpalace", nome: "Crystal Palace 🏴󠁧󠁢󠁥󠁮󠁧󠁿", categoria: "Bronze" },
            // La Liga
            { id: "esp_realmadrid", nome: "Real Madrid 🇪🇸", categoria: "Elite" },
            { id: "esp_barcelona", nome: "Barcelona 🇪🇸", categoria: "Elite" },
            { id: "esp_sevilla", nome: "Sevilla 🇪🇸", categoria: "Prata" },
            { id: "esp_getafe", nome: "Getafe 🇪🇸", categoria: "Bronze" },
            // Serie A
            { id: "ita_inter", nome: "Inter de Milão 🇮🇹", categoria: "Elite" },
            { id: "ita_juventus", nome: "Juventus 🇮🇹", categoria: "Elite" },
            { id: "ita_roma", nome: "Roma 🇮🇹", categoria: "Prata" },
            { id: "ita_monza", nome: "Monza 🇮🇹", categoria: "Bronze" },
            // Bundesliga
            { id: "ale_bayern", nome: "Bayern de Munique 🇩🇪", categoria: "Elite" },
            { id: "ale_dortmund", nome: "Borussia Dortmund 🇩🇪", categoria: "Elite" },
            { id: "ale_wolfsburg", nome: "Wolfsburg 🇩🇪", categoria: "Prata" },
            { id: "ale_augsburg", nome: "Augsburg 🇩🇪", categoria: "Bronze" },
            // Ligue 1
            { id: "fra_psg", nome: "PSG 🇫🇷", categoria: "Elite" },
            { id: "fra_marseille", nome: "Olympique Marseille 🇫🇷", categoria: "Prata" },
            { id: "fra_toulouse", nome: "Toulouse 🇫🇷", categoria: "Bronze" },
            // Brasileirão
            { id: "bra_flamengo", nome: "Flamengo 🇧🇷", categoria: "Prata" },
            { id: "bra_palmeiras", nome: "Palmeiras 🇧🇷", categoria: "Prata" },
            { id: "bra_vitoria", nome: "Vitória 🇧🇷", categoria: "Bronze" },
            // Portugal
            { id: "por_benfica", nome: "Benfica 🇵🇹", categoria: "Prata" },
            { id: "por_porto", nome: "Porto 🇵🇹", categoria: "Prata" },
            { id: "por_estoril", nome: "Estoril 🇵🇹", categoria: "Bronze" }
        ];

        btn.addEventListener("click", async () => {
            btn.disabled = true;
            status.style.color = "#b45309";
            status.innerText = "⏳ Conectando e gravando times...";

            let sucessos = 0;
            let erroDetectado = "";

            for (let time of listaTimes) {
                try {
                    await setDoc(doc(db, "times", time.id), {
                        nome: time.nome,
                        categoria: time.categoria
                    });
                    sucessos++;
                } catch (error) {
                    erroDetectado = error.message;
                    break; // Para o loop se der erro para podermos ver
                }
            }

            if (erroDetectado !== "") {
                status.style.color = "#b91c1c";
                status.innerText = "❌ FALHOU! O Firebase recusou a conexão. O erro foi: \n\n" + erroDetectado + "\n\n👉 Veja o Passo 2 na conversa!";
                btn.disabled = false;
            } else {
                status.style.color = "#15803d";
                status.innerText = "✅ PERFEITO! Todos os times foram salvos com sucesso!";
            }
        });
    </script>
</body>
</html>
