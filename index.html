<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Football Career - Brasil</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; padding: 10px; }
        
        /* Container principal simulando a tela do celular */
        .app-container { width: 100%; max-width: 420px; background-color: #d1d5db; border-radius: 12px; overflow: hidden; position: relative; padding-bottom: 20px;}
        
        /* CabeГ§alho Topo */
        .top-bar { display: flex; justify-content: space-between; background: white; padding: 5px; font-size: 12px; font-weight: bold; border-bottom: 2px solid #ccc; }
        .top-item { background: #f3f4f6; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; display: flex; align-items: center; gap: 4px; }
        
        /* Sub-cabeГ§alho (Totais) */
        .totals-bar { display: flex; justify-content: space-between; background: white; padding: 5px; text-align: center; font-size: 11px; font-weight: bold; border-bottom: 2px solid #ccc;}
        .totals-box { border: 1px solid #ccc; border-radius: 4px; padding: 2px 4px; min-width: 45px; }
        
        /* Barra de Atributos Roxa */
        .attr-bar { background-color: #6b21a8; color: white; display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: bold; padding: 4px 0; }
        .attr-vals { background-color: white; color: black; display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 14px; font-weight: bold; padding: 4px 0; border-bottom: 2px solid #ccc;}
        
        /* Corpo Principal */
        .main-body { display: flex; width: 100%; background: #d1d5db; padding: 5px;}
        
        /* Coluna Esquerda */
        .col-left { width: 45%; display: flex; flex-direction: column; gap: 4px; }
        .age-row { display: flex; align-items: center; height: 28px; }
        .age-box { width: 30px; height: 28px; background: #9ca3af; color: white; font-weight: bold; display: flex; justify-content: center; align-items: center; border-radius: 4px; font-size: 12px; flex-shrink: 0;}
        .age-box.academy { background: #fde047; color: black; }
        .age-box.retire, .age-box.manager { background: #fbbf24; color: black; }
        .club-box { background: white; flex-grow: 1; height: 100%; display: flex; align-items: center; padding: 0 5px; font-size: 10px; font-weight: bold; border: 1px solid #ccc; border-left: none; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; position: relative;}
        .transfer-fee { background: #fbcfe8; color: black; font-size: 9px; position: absolute; right: 0; top: 0; bottom: 0; padding: 0 4px; display: flex; align-items: center; font-weight: bold; border-left: 1px solid #ccc;}
        
        /* Coluna Direita */
        .col-right { width: 55%; padding-left: 5px; display: flex; flex-direction: column; gap: 4px; }
        .stats-header { background: #16a34a; color: white; font-size: 10px; font-weight: bold; text-align: center; padding: 2px; border-radius: 4px 4px 0 0; }
        .stats-icons { display: grid; grid-template-columns: repeat(3, 1fr); background: #86efac; text-align: center; font-size: 12px; padding: 2px 0; border-bottom: 1px solid #16a34a;}
        .stats-grid { display: flex; flex-direction: column; gap: 4px; background: #86efac; padding-bottom: 4px; border-radius: 0 0 4px 4px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; font-size: 12px; font-weight: bold; height: 28px; align-items: center; }
        
        /* BotГµes e Mercado */
        .action-area { padding: 10px; text-align: center; }
        .btn-continue { background: #10b981; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.2); width: 80%; }
        .btn-continue:active { transform: scale(0.95); }
        
        .market-panel { background: #fff; border: 2px solid #6b21a8; padding: 10px; border-radius: 8px; margin: 10px; display: none; }
        .market-title { font-size: 11px; font-weight: bold; color: white; background: #6b21a8; padding: 4px; text-align: center; margin:-10px -10px 10px -10px; border-radius: 6px 6px 0 0;}
        .offer-row { display: flex; justify-content: space-between; border: 1px solid #ccc; margin-bottom: 5px; align-items: center;}
        .offer-club { font-weight: bold; font-size: 12px; padding: 8px; flex-grow: 1; text-align: left; background: white;}
        .offer-val { background: #fbcfe8; font-weight: bold; font-size: 12px; padding: 8px; border-left: 1px solid #ccc; width: 80px; text-align: center; cursor: pointer;}
        
        /* SeГ§ГЈo Inferior (TrofГ©us) */
        .bottom-section { background: #fff; margin: 0 10px; border: 1px solid #ccc; text-align: center; border-radius: 4px; padding-bottom: 5px;}
        .bottom-title { background: #6b21a8; color: white; font-size: 11px; font-weight: bold; padding: 2px; }
        .trophy-grid { display: flex; justify-content: center; gap: 15px; padding-top: 5px; font-size: 18px; font-weight: bold; }
        .trophy-item { display: flex; flex-direction: column; align-items: center; font-size: 14px;}
        
        .empty-slot { background: #a3a3a3; opacity: 0.3; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="main-body">

            <div class="trophy-item">рџҐ‡<br><span id="maj-wc">0</span></div>
            <div class="trophy-item">вњЁ<br><span id="maj-bdor">0</span></div>
        </div>

</div>

<script>
    // BANCO DE DADOS DE CLUBES
    const baseClubs = [
        "Palmeiras рџ‡§рџ‡·", "Flamengo рџ‡§рџ‡·", "SГЈo Paulo рџ‡§рџ‡·", "Corinthians рџ‡§рџ‡·", "AtlГ©tico-MG рџ‡§рџ‡·", "GrГЄmio рџ‡§рџ‡·", "Fluminense рџ‡§рџ‡·", "Botafogo рџ‡§рџ‡·", "Boca Juniors рџ‡¦рџ‡·", "River Plate рџ‡¦рџ‡·", "Racing рџ‡¦рџ‡·", "Independiente рџ‡¦рџ‡·", "PeГ±arol рџ‡єрџ‡ѕ", "Nacional рџ‡єрџ‡ѕ", "Colo-Colo рџ‡Ёрџ‡±", "AtlГ©tico Nacional рџ‡Ёрџ‡ґ", "LDU рџ‡Єрџ‡Ё",
        "Aston Villa рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "Newcastle рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "West Ham рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "Everton рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "Real Sociedad рџ‡Єрџ‡ё", "Betis рџ‡Єрџ‡ё", "Athletic Bilbao рџ‡Єрџ‡ё", "Sevilla рџ‡Єрџ‡ё", "Lazio рџ‡®рџ‡№", "Roma рџ‡®рџ‡№", "Fiorentina рџ‡®рџ‡№", "Atalanta рџ‡®рџ‡№", "Bayer Leverkusen рџ‡©рџ‡Є", "RB Leipzig рџ‡©рџ‡Є", "Eintracht Frankfurt рџ‡©рџ‡Є", "Marseille рџ‡«рџ‡·", "Lyon рџ‡«рџ‡·", "Monaco рџ‡«рџ‡·", "Benfica рџ‡µрџ‡№", "Porto рџ‡µрџ‡№", "Sporting рџ‡µрџ‡№", "Ajax рџ‡ірџ‡±", "PSV рџ‡ірџ‡±", "Feyenoord рџ‡ірџ‡±", "Galatasaray рџ‡№рџ‡·", "FenerbahГ§e рџ‡№рџ‡·", "Besiktas рџ‡№рџ‡·", "Celtic рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї",
        "Inter Miami рџ‡єрџ‡ё", "LA Galaxy рџ‡єрџ‡ё", "LAFC рџ‡єрџ‡ё", "New York City рџ‡єрџ‡ё", "Seattle Sounders рџ‡єрџ‡ё", "Club AmГ©rica рџ‡Ірџ‡Ѕ", "Monterrey рџ‡Ірџ‡Ѕ", "Tigres UANL рџ‡Ірџ‡Ѕ", "Cruz Azul рџ‡Ірџ‡Ѕ", "Pachuca рџ‡Ірџ‡Ѕ",
        "Al-Ahli рџ‡ёрџ‡¦", "Al-Shabab рџ‡ёрџ‡¦", "Al Ain рџ‡¦рџ‡Є", "Al-Sadd рџ‡¶рџ‡¦", "Al-Duhail рџ‡¶рџ‡¦", "Vissel Kobe рџ‡Їрџ‡µ", "Kawasaki Frontale рџ‡Їрџ‡µ", "Urawa Reds рџ‡Їрџ‡µ", "Yokohama F. Marinos рџ‡Їрџ‡µ", "Ulsan Hyundai рџ‡°рџ‡·", "Jeonbuk Motors рџ‡°рџ‡·",
        "Al Ahly рџ‡Єрџ‡¬", "Zamalek рџ‡Єрџ‡¬", "Wydad Casablanca рџ‡Ірџ‡¦", "Raja Casablanca рџ‡Ірџ‡¦", "Mamelodi Sundowns рџ‡їрџ‡¦", "Orlando Pirates рџ‡їрџ‡¦", "EspГ©rance de Tunis рџ‡№рџ‡і"
    ];

    const eliteClubs = [
        "Real Madrid рџ‡Єрџ‡ё", "Barcelona рџ‡Єрџ‡ё", "AtlГ©tico de Madrid рџ‡Єрџ‡ё", 
        "Manchester City рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "Arsenal рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "Liverpool рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "Chelsea рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "Manchester United рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", "Tottenham рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", 
        "Bayern de Munique рџ‡©рџ‡Є", "Borussia Dortmund рџ‡©рџ‡Є", 
        "Inter de MilГЈo рџ‡®рџ‡№", "Juventus рџ‡®рџ‡№", "Milan рџ‡®рџ‡№", "Napoli рџ‡®рџ‡№", 
        "PSG рџ‡«рџ‡·", "Al-Hilal рџ‡ёрџ‡¦", "Al-Nassr рџ‡ёрџ‡¦", "Al-Ittihad рџ‡ёрџ‡¦"
    ];

    // Status do Jogador
    let p = {
        age: 15, ovr: 0, pac: 0, sho: 0, pas: 0, dri: 0, def: 0, phy: 0, prime: 0,
        club: "", transferFee: "", isProdigy: false,
        totals: { dom: 0, int: 0, app: 0, gol: 0, ass: 0, cont: 0, wc: 0, bdor: 0, yc: 0, rc: 0 }
    };
    
    const ages = ["A", 18, 21, 24, 27, 30, 33, 36, 39, "R", "M"];
    let currentStep = 0;

    function initPlayer() {
        // LГіgica do ProdГ­gio (15% de chance de jГЎ nascer muito acima da mГ©dia)
        p.isProdigy = Math.random() > 0.85; 
        
        let baseOvr = p.isProdigy ? Math.floor(Math.random() * 5) + 74 : Math.floor(Math.random() * 8) + 60;
        
        p.ovr = baseOvr;
        p.prime = baseOvr;
        p.pac = baseOvr + Math.floor(Math.random() * 8);
        p.sho = baseOvr + Math.floor(Math.random() * 6);
        p.pas = baseOvr - Math.floor(Math.random() * 5);
        p.dri = baseOvr + Math.floor(Math.random() * 7);
        p.def = 30 + Math.floor(Math.random() * 20);
        p.phy = baseOvr - Math.floor(Math.random() * 5);

        // Se for prodГ­gio, pode comeГ§ar direto em um time melhor
        let pool = p.isProdigy ? [...baseClubs, ...eliteClubs] : baseClubs;
        p.club = pool[Math.floor(Math.random() * pool.length)];

        // Identifica regiГЈo pelo Г­cone do clube
        if(p.club.includes("рџ‡Єрџ‡ё") || p.club.includes("рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї") || p.club.includes("рџ‡©рџ‡Є") || p.club.includes("рџ‡®рџ‡№") || p.club.includes("рџ‡«рџ‡·") || p.club.includes("рџ‡µрџ‡№") || p.club.includes("рџ‡ірџ‡±") || p.club.includes("рџ‡№рџ‡·") || p.club.includes("рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї")) document.getElementById('hdr-region').innerText = "рџЊЌ Europe";
        else if(p.club.includes("рџ‡ёрџ‡¦") || p.club.includes("рџ‡¦рџ‡Є") || p.club.includes("рџ‡¶рџ‡¦") || p.club.includes("рџ‡Їрџ‡µ") || p.club.includes("рџ‡°рџ‡·")) document.getElementById('hdr-region').innerText = "рџЊЌ Asia";
        else if(p.club.includes("рџ‡єрџ‡ё") || p.club.includes("рџ‡Ірџ‡Ѕ")) document.getElementById('hdr-region').innerText = "рџЊЌ N. America";
        else if(p.club.includes("рџ‡Єрџ‡¬") || p.club.includes("рџ‡Ірџ‡¦") || p.club.includes("рџ‡їрџ‡¦") || p.club.includes("рџ‡№рџ‡і")) document.getElementById('hdr-region').innerText = "рџЊЌ Africa";
        else document.getElementById('hdr-region').innerText = "рџЊЌ S. America";
    }
    
    function initGrid() {
        initPlayer();
        
        const left = document.getElementById('col-left');
        const right = document.getElementById('stats-grid');
        left.innerHTML = ''; right.innerHTML = '';
        
        ages.forEach((a, index) => {
            let boxClass = "age-box";
            if (a === "A") boxClass += " academy";
            if (a === "R" || a === "M") boxClass += " retire";
            
            left.innerHTML += `
                <div class="age-row" id="row-left-${index}">
                    <div class="${boxClass}">${a}</div>
                    <div class="club-box" id="club-box-${index}"><div class="empty-slot"></div></div>
                </div>`;
                
            if(a !== "R" && a !== "M" && a !== "A") {
                right.innerHTML += `<div class="stats-row" id="row-right-${index}"><div>-</div><div>-</div><div>-</div></div>`;
            } else if (a === "A") {
                right.innerHTML += `<div class="stats-row" id="row-right-0" style="background:#fef08a; border-bottom:1px solid #16a34a;"><div>-</div><div>-</div><div>-</div></div>`;
            }
        });
        
        let prodigyTag = p.isProdigy ? "вњЁ " : "";
        document.getElementById(`club-box-0`).innerHTML = prodigyTag + p.club;
        atualizarAtributos();
        atualizarTopo();
    }

    function atualizarTopo() {
        document.getElementById('hdr-age').innerText = (p.age === 15) ? "15" : p.age;
        if(p.ovr > p.prime) p.prime = p.ovr;
        document.getElementById('hdr-prime').innerText = p.prime;
        
        let valBase = (p.ovr > 85) ? Math.floor(Math.random() * 100) + 50 : Math.floor(Math.random() * 40) + 5;
        if(p.isProdigy && p.age < 22) valBase *= 2; // InflaГ§ГЈo de prodГ­gio
        if(p.age > 33) valBase = Math.floor(valBase * 0.3);
        
        let valStr = "в‚¬" + valBase + "m";
        document.getElementById('hdr-value').innerText = (p.age === 15) ? "-" : valStr;
        return valStr;
    }

    function atualizarAtributos() {
        // Cap em 99
        ['ovr','pac','sho','pas','dri','def','phy'].forEach(attr => { if(p[attr] > 99) p[attr] = 99; if(p[attr] < 30) p[attr] = 30; });
        document.getElementById('attr-vals').innerHTML = `
            <div>${p.ovr}</div><div>${p.pac}</div><div>${p.sho}</div>
            <div>${p.pas}</div><div>${p.dri}</div><div>${p.def}</div><div>${p.phy}</div>
        `;
    }

    function atualizarTotais() {
        document.getElementById('tot-dom').innerText = p.totals.dom;
        document.getElementById('tot-int').innerText = p.totals.int;
        document.getElementById('tot-app').innerText = p.totals.app;
        document.getElementById('tot-gol').innerText = p.totals.gol;
        document.getElementById('tot-ass').innerText = p.totals.ass;
        document.getElementById('tot-yc').innerText = p.totals.yc;
        document.getElementById('tot-rc').innerText = p.totals.rc;
        
        document.getElementById('maj-cont').innerText = p.totals.cont;
        document.getElementById('maj-wc').innerText = p.totals.wc;
        document.getElementById('maj-bdor').innerText = p.totals.bdor;
    }

    function avancarCarreira() {
        document.getElementById('btn-main').innerText = "CONTINUE";
        
        if (currentStep === 0) { currentStep = 1; p.age = 18; } 
        else {
            if (p.age >= 39) { finalizarCarreira(); return; }
            p.age += 3; currentStep++;
        }
        
        let isPrime = (p.age >= 24 && p.age <= 30);
        let isOld = (p.age >= 33);
        
        // EvoluГ§ГЈo de OVR (ProdГ­gios evoluem mais rГЎpido)
        if (p.age <= 27) {
            let ganho = Math.floor(Math.random() * (p.isProdigy ? 6 : 4)) + 1;
            p.ovr += ganho; p.sho += ganho; p.dri += ganho; p.pac += 1;
        } else if (isOld) {
            let perda = Math.floor(Math.random() * 5) + 1;
            p.ovr -= Math.floor(perda/2); p.pac -= (perda+2); p.phy -= perda;
        }
        
        let apps = 90 + Math.floor(Math.random() * 30);
        let gol = Math.floor(apps * (p.sho / 100) * (Math.random() * 0.6 + 0.3));
        let ass = Math.floor(apps * (p.pas / 100) * 0.4);
        let yc = Math.floor(Math.random() * 10);
        let rc = Math.floor(Math.random() * 2);
        
        p.totals.app += apps; p.totals.gol += gol; p.totals.ass += ass;
        p.totals.yc += yc; p.totals.rc += rc;
        
        let tDom = 0, tInt = 0;
        if(p.ovr > 78 && Math.random() > 0.4) { tDom = Math.floor(Math.random() * 3); p.totals.dom += tDom; }
        if(p.ovr > 84 && Math.random() > 0.6) { tInt = Math.floor(Math.random() * 2); p.totals.int += tInt; }
        
        if(p.ovr > 86 && Math.random() > 0.7) p.totals.cont++;
        if(p.age % 4 === 0 && p.ovr > 87 && Math.random() > 0.8) p.totals.wc++;
        if(p.ovr >= 91 && gol > 60 && Math.random() > 0.6) p.totals.bdor++;

        let transferTag = p.transferFee ? `<div class="transfer-fee">рџ”Ѓ ${p.transferFee}</div>` : "";
        document.getElementById(`club-box-${currentStep}`).innerHTML = `${p.club} ${transferTag}`;
        
        document.getElementById(`row-right-${currentStep}`).innerHTML = `
            <div>${tDom} <span style="color:#6b7280; font-size:10px;">/</span> ${tInt}</div>
            <div>${gol}</div><div>${ass}</div>
        `;

        atualizarTopo();
        atualizarAtributos();
        atualizarTotais();

        if (p.age < 39) abirMercado();
        else finalizarCarreira();
    }

    function abirMercado() {
        document.getElementById('action-area').style.display = 'none';
        document.getElementById('market-panel').style.display = 'block';
        
        let list = document.getElementById('offer-list');
        list.innerHTML = "";
        
        let pool = (p.ovr >= 85) ? eliteClubs : baseClubs;
        
        for(let i=0; i<2; i++) {
            let c = pool[Math.floor(Math.random() * pool.length)];
            let val = (p.ovr > 85) ? Math.floor(Math.random()*120)+40 : Math.floor(Math.random()*30)+5;
            if(p.age > 33) val = Math.floor(val * 0.4);
            
            list.innerHTML += `
                <div class="offer-row">
                    <div class="offer-club">${c}</div>
                    <div class="offer-val" onclick="aceitarOferta('${c}', 'в‚¬${val}m')">рџ¤ќ в‚¬${val}m</div>
                </div>
            `;
        }
    }

    function aceitarOferta(clube, valor) { p.club = clube; p.transferFee = valor; fecharMercado(); }
    function ficarNoTime() { p.transferFee = ""; fecharMercado(); }
    function fecharMercado() { document.getElementById('market-panel').style.display = 'none'; document.getElementById('action-area').style.display = 'block'; }

    function finalizarCarreira() {
        document.getElementById(`club-box-${ages.length-2}`).innerHTML = p.club;
        document.getElementById(`club-box-${ages.length-1}`).innerHTML = (p.ovr > 85) ? eliteClubs[Math.floor(Math.random()*eliteClubs.length)] : "Manager";
        document.getElementById('action-area').innerHTML = `<button class="btn-continue" style="background:#ef4444;" onclick="location.reload()">RESTART</button>`;
    }

    initGrid();
</script>
</body>
</html>
