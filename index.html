<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Simulador de Carreira</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --primary: #00ff88;
            --text-light: #ffffff;
            --gold: #ffd700;
            --transfer-color: #ff0055;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1, h2, h3 { text-align: center; margin-top: 0; }
        
        /* CARD DO JOGADOR */
        .player-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .player-info h2 { margin: 0; color: var(--primary); }
        .market-value { font-size: 24px; font-weight: bold; color: #00e676; background: #003300; padding: 5px 10px; border-radius: 8px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 15px; }
        .stat-box { background: #311b92; padding: 10px 5px; border-radius: 5px; text-align: center; font-size: 14px; font-weight: bold; }
        .stat-value { font-size: 20px; background: white; color: black; border-radius: 3px; margin-top: 5px; }
        
        .trophy-cabinet { background: #f4f4f4; color: black; display: flex; justify-content: space-around; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 15px; }
        .trophy-item { text-align: center; font-size: 18px; }
        
        /* LAYOUT DUPLO PARA PRINTS */
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .col-left { flex: 2; }
        .col-right { flex: 1; background: #2a2a2a; border-radius: 8px; padding: 10px; max-height: 400px; overflow-y: auto; }
        
        /* TABELA HISTГ“RICO */
        .history-table { width: 100%; border-collapse: collapse; background: #88c999; color: black; font-weight: bold; text-align: center; border-radius: 8px; overflow: hidden; font-size: 13px;}
        .history-table th { background: #008f39; color: white; padding: 8px; }
        .history-table td { padding: 6px; border-bottom: 1px solid #6eb881; }
        .row-age { background: #311b92; color: white; }
        
        /* HISTГ“RICO DE TRANSFERГЉNCIAS */
        .transfer-log { font-size: 12px; margin-bottom: 5px; padding: 5px; background: #111; border-left: 3px solid var(--transfer-color); }
        
        .btn { background: var(--transfer-color); color: white; border: none; padding: 12px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn:hover { filter: brightness(1.2); }
        .btn-market { background: #0055ff; }
        .btn-stay { background: #555; }
        
        #transfer-market { display: none; background: #111; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <div id="start-screen">
        <h1>Mega Simulador de Carreira Mundial рџЊЌ</h1>
        <button class="btn" onclick="iniciarCarreira()">Iniciar Carreira na AmГ©rica do Sul</button>
    </div>

    <div id="main-screen" style="display: none;">
        <div class="player-header">
            <div class="player-info">
                <h2>OVR: <span id="header-ovr">70</span> | Atacante (ST)</h2>
                <div id="player-club-title" style="font-size: 18px;">Clube Atual</div>
            </div>
            <div class="market-value" title="Valor de Mercado">в‚¬<span id="player-value">10</span>m</div>
        </div>

        <div class="trophy-cabinet">
            <div class="trophy-item">рџЏ† Liga<br><span id="t-liga">0</span></div>
            <div class="trophy-item">рџЊЋ Cont<br><span id="t-cont">0</span></div>
            <div class="trophy-item">рџҐ‡ Copa<br><span id="t-copa">0</span></div>
            <div class="trophy-item">вњЁ B.Ouro<br><span id="t-bdor">0</span></div>
        </div>

        <div class="stats-grid">
            <div class="stat-box" style="background:#b71c1c">OVR<div class="stat-value" id="stat-ovr">70</div></div>
            <div class="stat-box">PAC<div class="stat-value" id="stat-pac">70</div></div>
            <div class="stat-box">SHO<div class="stat-value" id="stat-sho">70</div></div>
            <div class="stat-box">PAS<div class="stat-value" id="stat-pas">70</div></div>
            <div class="stat-box">DRI<div class="stat-value" id="stat-dri">70</div></div>
            <div class="stat-box">PHY<div class="stat-value" id="stat-phy">70</div></div>
        </div>

        <div class="dashboard">
            <div class="col-left">
                <table class="history-table" id="history-table">
                    <thead>
                        <tr>
                            <th style="width: 10%;">Idd</th>
                            <th style="width: 45%;">Clube</th>
                            <th title="Jogos">рџЏџпёЏ</th>
                            <th title="Gols">вљЅ</th>
                            <th title="AssistГЄncias">рџ‘џ</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
            <div class="col-right">
                <h3 style="color: var(--primary); font-size: 14px; border-bottom: 1px solid #555; padding-bottom: 5px;">рџ“њ TransferГЄncias</h3>
                <div id="transfer-history-log"></div>
            </div>
        </div>

        <div id="action-area">
            <button class="btn" onclick="simularTemporada()">Jogar Temporada</button>
        </div>

        <div id="transfer-market">
            <h3 style="color: var(--primary);">MERCADO DE TRANSFERГЉNCIAS рџ¤ќ</h3>
            <p id="market-msg" style="font-size: 14px; color: #ccc;">Avaliando propostas...</p>
            <div id="offers-list"></div>
            <button class="btn btn-stay" id="btn-stay" onclick="rejeitarOfertas()">Ficar no Clube</button>
        </div>
    </div>
</div>

        { nome: "Flamengo", pais: "рџ‡§рџ‡·", tier: 3 }, { nome: "Palmeiras", pais: "рџ‡§рџ‡·", tier: 3 }, { nome: "SГЈo Paulo", pais: "рџ‡§рџ‡·", tier: 4 }, { nome: "Corinthians", pais: "рџ‡§рџ‡·", tier: 4 }, { nome: "Fluminense", pais: "рџ‡§рџ‡·", tier: 4 }, { nome: "GrГЄmio", pais: "рџ‡§рџ‡·", tier: 4 },

        { nome: "AtlГ©tico Nacional", pais: "рџ‡Ёрџ‡ґ", tier: 4 }, { nome: "Millonarios", pais: "рџ‡Ёрџ‡ґ", tier: 5 }, { nome: "PeГ±arol", pais: "рџ‡єрџ‡ѕ", tier: 4 }, { nome: "Nacional", pais: "рџ‡єрџ‡ѕ", tier: 4 },
        { nome: "Colo-Colo", pais: "рџ‡Ёрџ‡±", tier: 5 }, { nome: "LDU Quito", pais: "рџ‡Єрџ‡Ё", tier: 4 }, { nome: "Indep. del Valle", pais: "рџ‡Єрџ‡Ё", tier: 4 }, { nome: "Olimpia", pais: "рџ‡µрџ‡ѕ", tier: 4 }, { nome: "BolГ­var", pais: "рџ‡§рџ‡ґ", tier: 5 }, { nome: "Alianza Lima", pais: "рџ‡µрџ‡Є", tier: 5 }, { nome: "Caracas", pais: "рџ‡»рџ‡Є", tier: 5 },

        { nome: "Real Madrid", pais: "рџ‡Єрџ‡ё", tier: 1 }, { nome: "Barcelona", pais: "рџ‡Єрџ‡ё", tier: 1 }, { nome: "AtlГ©tico Madrid", pais: "рџ‡Єрџ‡ё", tier: 2 }, { nome: "Sevilla", pais: "рџ‡Єрџ‡ё", tier: 2 }, { nome: "Betis", pais: "рџ‡Єрџ‡ё", tier: 3 }, { nome: "Valencia", pais: "рџ‡Єрџ‡ё", tier: 3 },
        { nome: "Man. City", pais: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", tier: 1 }, { nome: "Arsenal", pais: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", tier: 1 }, { nome: "Liverpool", pais: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", tier: 1 }, { nome: "Chelsea", pais: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", tier: 2 }, { nome: "Man. United", pais: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", tier: 2 }, { nome: "Tottenham", pais: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", tier: 2 }, { nome: "Aston Villa", pais: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", tier: 2 }, { nome: "Newcastle", pais: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї", tier: 2 },
        { nome: "Bayern", pais: "рџ‡©рџ‡Є", tier: 1 }, { nome: "Dortmund", pais: "рџ‡©рџ‡Є", tier: 2 }, { nome: "Leverkusen", pais: "рџ‡©рџ‡Є", tier: 2 }, { nome: "Leipzig", pais: "рџ‡©рџ‡Є", tier: 2 },
        { nome: "Inter", pais: "рџ‡®рџ‡№", tier: 1 }, { nome: "Juventus", pais: "рџ‡®рџ‡№", tier: 2 }, { nome: "Milan", pais: "рџ‡®рџ‡№", tier: 2 }, { nome: "Napoli", pais: "рџ‡®рџ‡№", tier: 2 }, { nome: "Roma", pais: "рџ‡®рџ‡№", tier: 3 },
        { nome: "PSG", pais: "рџ‡«рџ‡·", tier: 1 }, { nome: "Monaco", pais: "рџ‡«рџ‡·", tier: 2 }, { nome: "Marseille", pais: "рџ‡«рџ‡·", tier: 3 }, { nome: "Lyon", pais: "рџ‡«рџ‡·", tier: 3 },
        { nome: "Benfica", pais: "рџ‡µрџ‡№", tier: 2 }, { nome: "Porto", pais: "рџ‡µрџ‡№", tier: 2 }, { nome: "Sporting", pais: "рџ‡µрџ‡№", tier: 2 }, { nome: "Ajax", pais: "рџ‡ірџ‡±", tier: 3 }, { nome: "PSV", pais: "рџ‡ірџ‡±", tier: 3 }, { nome: "Feyenoord", pais: "рџ‡ірџ‡±", tier: 3 }, { nome: "Celtic", pais: "рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї", tier: 3 }, { nome: "Galatasaray", pais: "рџ‡№рџ‡·", tier: 3 }, { nome: "FenerbahГ§e", pais: "рџ‡№рџ‡·", tier: 3 }, { nome: "Olympiacos", pais: "рџ‡¬рџ‡·", tier: 4 }, { nome: "Estrela Vermelha", pais: "рџ‡·рџ‡ё", tier: 4 },

        // AMГ‰RICA DO NORTE (Tier 4 e 5)
        { nome: "Inter Miami", pais: "рџ‡єрџ‡ё", tier: 3 }, { nome: "LA Galaxy", pais: "рџ‡єрџ‡ё", tier: 4 }, { nome: "LAFC", pais: "рџ‡єрџ‡ё", tier: 4 }, { nome: "Seattle Sounders", pais: "рџ‡єрџ‡ё", tier: 4 }, { nome: "New York City", pais: "рџ‡єрџ‡ё", tier: 4 },
        { nome: "Club AmГ©rica", pais: "рџ‡Ірџ‡Ѕ", tier: 3 }, { nome: "Monterrey", pais: "рџ‡Ірџ‡Ѕ", tier: 4 }, { nome: "Tigres", pais: "рџ‡Ірџ‡Ѕ", tier: 4 }, { nome: "Cruz Azul", pais: "рџ‡Ірџ‡Ѕ", tier: 4 }, { nome: "Pachuca", pais: "рџ‡Ірџ‡Ѕ", tier: 4 },

        // ГЃSIA & ORIENTE MГ‰DIO (ArГЎbia com dinheiro = Tier ГЃrabe)
        { nome: "Al-Hilal", pais: "рџ‡ёрџ‡¦", tier: "Arabia" }, { nome: "Al-Nassr", pais: "рџ‡ёрџ‡¦", tier: "Arabia" }, { nome: "Al-Ittihad", pais: "рџ‡ёрџ‡¦", tier: "Arabia" }, { nome: "Al-Ahli", pais: "рџ‡ёрџ‡¦", tier: "Arabia" },
        { nome: "Urawa Reds", pais: "рџ‡Їрџ‡µ", tier: 5 }, { nome: "Kawasaki Fron.", pais: "рџ‡Їрџ‡µ", tier: 5 }, { nome: "Yokohama FM", pais: "рџ‡Їрџ‡µ", tier: 5 },
        { nome: "Ulsan Hyundai", pais: "рџ‡°рџ‡·", tier: 5 }, { nome: "Jeonbuk", pais: "рџ‡°рџ‡·", tier: 5 },
        { nome: "Al Ain", pais: "рџ‡¦рџ‡Є", tier: 4 }, { nome: "Al Sadd", pais: "рџ‡¶рџ‡¦", tier: 4 }, { nome: "Shanghai Port", pais: "рџ‡Ёрџ‡і", tier: 5 },

        // ГЃFRICA (Tier 4 e 5)
        { nome: "Al Ahly", pais: "рџ‡Єрџ‡¬", tier: 4 }, { nome: "Zamalek", pais: "рџ‡Єрџ‡¬", tier: 5 }, { nome: "Mamelodi", pais: "рџ‡їрџ‡¦", tier: 4 }, { nome: "Orlando Pirates", pais: "рџ‡їрџ‡¦", tier: 5 }, { nome: "Wydad", pais: "рџ‡Ірџ‡¦", tier: 4 }, { nome: "Raja Cas.", pais: "рџ‡Ірџ‡¦", tier: 5 }, { nome: "EspГ©rance", pais: "рџ‡№рџ‡і", tier: 4 }, { nome: "TP Mazembe", pais: "рџ‡Ёрџ‡©", tier: 5 }
    ];

    let jogador = {
        idade: 17, clubeAtual: null, valorMercado: 0,
        atributos: { ovr: 0, pac: 0, sho: 0, pas: 0, dri: 0, phy: 0 },
        titulos: { ligas: 0, continentais: 0, copasMundo: 0, bolasDeOuro: 0 }
    };

    function aleatorio(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function eventoMundoFutebol() {
        // Simula bilionГЎrios comprando times ou crises financeiras
        let timeAleatorio = clubesMundo[aleatorio(0, clubesMundo.length - 1)];
        if (Math.random() > 0.85) {
            if (typeof timeAleatorio.tier === 'number') {
                if (Math.random() > 0.5 && timeAleatorio.tier > 1) {
                    timeAleatorio.tier--; // Melhorou
                } else if (timeAleatorio.tier < 5) {
                    timeAleatorio.tier++; // Piorou
                }
            }
        }
    }

    function calcularValorMercado() {
        let base = Math.pow(jogador.atributos.ovr, 2) / 100;
        if (jogador.idade < 23) base *= 1.5; // Promessa
        if (jogador.idade > 31) base *= 0.6; // Veterano
        jogador.valorMercado = Math.floor(base) + aleatorio(1, 15);
        document.getElementById('player-value').innerText = jogador.valorMercado;
    }

    function iniciarCarreira() {
        let base = aleatorio(65, 75); 
        jogador.atributos = {
            ovr: base, pac: base + aleatorio(0, 15), sho: base + aleatorio(-10, 10),
            pas: base + aleatorio(-10, 10), dri: base + aleatorio(-5, 12), phy: base + aleatorio(-10, 15)
        };
        recalcularOVR();

        // Inicia na AmГ©rica do Sul (Tier 4 ou 5)
        let timesIniciais = clubesMundo.filter(c => ["рџ‡§рџ‡·","рџ‡¦рџ‡·","рџ‡Ёрџ‡ґ","рџ‡єрџ‡ѕ","рџ‡Ёрџ‡±","рџ‡Єрџ‡Ё","рџ‡µрџ‡ѕ","рџ‡§рџ‡ґ","рџ‡µрџ‡Є","рџ‡»рџ‡Є"].includes(c.pais) && c.tier >= 4);
        jogador.clubeAtual = timesIniciais[aleatorio(0, timesIniciais.length - 1)];
        
        registrarTransferencia("Base", jogador.clubeAtual, 0);

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        calcularValorMercado();
        atualizarTela();
    }

    function recalcularOVR() {
        let a = jogador.atributos;
        a.ovr = Math.floor((a.pac * 0.2) + (a.sho * 0.35) + (a.pas * 0.15) + (a.dri * 0.2) + (a.phy * 0.1));
        for(let key in a) { if(a[key] > 99) a[key] = 99; if(a[key] < 30) a[key] = 30; }
        document.getElementById('header-ovr').innerText = a.ovr;
    }

    function simularTemporada() {
        eventoMundoFutebol(); // O mundo muda
        let attr = jogador.atributos;
        
        let maxJogos = 55;
        let jogosPerdidos = 0;
        if (attr.phy < 75 && Math.random() > 0.25) jogosPerdidos = aleatorio(5, 35); 
        let jogosJogados = maxJogos - jogosPerdidos;

        // Dificuldade Realista
        let chanceGol = ((attr.sho * 0.6) + (attr.pac * 0.2) + (attr.dri * 0.2)) / 100;
        let gols = Math.floor(jogosJogados * chanceGol * (Math.random() * 0.4 + 0.4));
        
        let fatorLiga = typeof jogador.clubeAtual.tier === 'number' ? jogador.clubeAtual.tier : 3;
        if (fatorLiga === 1) gols = Math.floor(gols * 0.75); // Dificil na Europa
        if (jogador.clubeAtual.tier === "Arabia") gols = Math.floor(gols * 1.5); 

        let chanceAssist = (attr.pas / 100) * 0.4;
        let assists = Math.floor(jogosJogados * chanceAssist * (Math.random() * 0.4 + 0.4));

        // TГ­tulos (Muito mais difГ­cil)
        let forcaEquipe = (typeof jogador.clubeAtual.tier === 'number' ? (6 - jogador.clubeAtual.tier) * 15 : 60) + (attr.ovr * 0.5);
        let tLiga = false, tCont = false, tCopa = false, tBdor = false;

        // Fator Zebras e Caos
        if (Math.random() * 150 < forcaEquipe) { tLiga = true; jogador.titulos.ligas++; }
        
        // Libertadores/Champions Г© um inferno de ganhar
        if (Math.random() * 250 < forcaEquipe) { tCont = true; jogador.titulos.continentais++; }
        
        // Copa do Mundo (SГі a cada 4 anos, rarГ­ssimo)
        if (jogador.idade % 4 === 0 && attr.ovr > 86 && Math.random() > 0.94) { tCopa = true; jogador.titulos.copasMundo++; }
        
        // Bola de Ouro (Precisa de nГєmeros absurdos e um tГ­tulo de peso)
        if (gols >= 45 && attr.ovr >= 92 && (tCont || tCopa) && Math.random() > 0.5) { tBdor = true; jogador.titulos.bolasDeOuro++; }

        // HistГіrico
        let tabela = document.getElementById('history-body');
        let linha = `<tr>
            <td class="row-age">${jogador.idade}</td>
            <td>${jogador.clubeAtual.nome} ${jogador.clubeAtual.pais}</td>
            <td>${jogosJogados}</td>
            <td>${gols}</td>
            <td>${assists}</td>
        </tr>`;
        tabela.innerHTML = linha + tabela.innerHTML;

        // EvoluГ§ГЈo
        if (jogador.idade <= 28) {
            attr.pac += aleatorio(0, 2); attr.sho += aleatorio(1, 4); attr.pas += aleatorio(1, 3);
            attr.dri += aleatorio(1, 3); attr.phy += aleatorio(0, 2);
        } else if (jogador.idade > 31) {
            attr.pac -= aleatorio(1, 5); attr.phy -= aleatorio(1, 4); attr.sho -= aleatorio(0, 2);
            attr.pas += aleatorio(0, 1); // Fica mais inteligente
        }
        recalcularOVR();
        jogador.idade++;
        calcularValorMercado();
        atualizarTela();

        if (jogador.idade > aleatorio(36, 41) || attr.ovr < 45) {
            document.getElementById('action-area').innerHTML = `<button class='btn' style='background: red;' onclick='location.reload()'>Carreira Encerrada! Jogar Novamente</button>`;
            return;
        }

        abrirMercado();
    }

    function abrirMercado() {
        document.getElementById('action-area').style.display = 'none';
        let market = document.getElementById('transfer-market');
        let offersList = document.getElementById('offers-list');
        let msg = document.getElementById('market-msg');
        offersList.innerHTML = '';
        market.style.display = 'block';
        
        let ovr = jogador.atributos.ovr;
        let propostas = [];

        clubesMundo.forEach(c => {
            if (c.nome === jogador.clubeAtual.nome) return;
            let interessa = false;
            
            // LГіgica rigorosa de mercado
            if (ovr >= 90 && c.tier === 1) interessa = true; // Elite
            if (ovr >= 82 && ovr < 93 && c.tier === 2) interessa = true; // Forte Europa
            if (ovr >= 75 && ovr < 86 && c.tier === 3) interessa = true; // MГ©dio
            if (ovr >= 65 && ovr < 80 && c.tier === 4) interessa = true; // Pequeno
            if (ovr < 75 && c.tier === 5) interessa = true; // Muito Pequeno

            if (jogador.idade >= 30 && ovr >= 85 && c.tier === "Arabia") interessa = true;

            // Fator aleatГіrio de mercado (as vezes ninguem quer, as vezes um time doido faz oferta)
            if (interessa && Math.random() > 0.8) propostas.push(c);
        });

        // Limita a 3 ofertas
        propostas = propostas.sort(() => 0.5 - Math.random()).slice(0, 3);
        window.propostasAtuais = [];

        if (propostas.length === 0) { 
            msg.innerText = "Nenhum clube fez proposta oficial nesta janela.";
            document.getElementById('btn-stay').innerText = "Continuar no Clube";
        } else {
            msg.innerText = `VocГЄ recebeu ${propostas.length} proposta(s)!`;
            document.getElementById('btn-stay').innerText = "Recusar Ofertas";
            
            propostas.forEach((clube, index) => {
                let valorOferta = jogador.valorMercado + aleatorio(-10, 30);
                if (valorOferta < 1) valorOferta = 1;
                if (clube.tier === "Arabia") valorOferta = Math.floor(valorOferta * 2.5);

                window.propostasAtuais.push({ clube: clube, valor: valorOferta });

                offersList.innerHTML += `<button class="btn btn-market" onclick="aceitarTransferencia(${index})">
                    ${clube.nome} ${clube.pais} (в‚¬${valorOferta}M)
                </button>`;
            });
        }
    }

    function registrarTransferencia(origem, destino, valor) {
        let logDiv = document.getElementById('transfer-history-log');
        let textoOrigem = origem === "Base" ? "Base" : origem.nome;
        let taxa = valor > 0 ? `в‚¬${valor}M` : "Custo Zero";
        logDiv.innerHTML = `<div class="transfer-log">Idd ${jogador.idade}: ${textoOrigem} вћ” ${destino.nome} ${destino.pais}<br><span style="color:#00ff88;">${taxa}</span></div>` + logDiv.innerHTML;
    }

    function aceitarTransferencia(index) {
        let proposta = window.propostasAtuais[index];
        registrarTransferencia(jogador.clubeAtual, proposta.clube, proposta.valor);
        jogador.clubeAtual = proposta.clube;
        fecharMercado();
    }

    function rejeitarOfertas() { fecharMercado(); }

    function fecharMercado() {
        document.getElementById('transfer-market').style.display = 'none';
        document.getElementById('action-area').style.display = 'block';
        atualizarTela();
    }

    function atualizarTela() {
        document.getElementById('player-club-title').innerText = jogador.clubeAtual.nome + " " + jogador.clubeAtual.pais;
        
        let a = jogador.atributos;
        document.getElementById('stat-pac').innerText = a.pac;
        document.getElementById('stat-sho').innerText = a.sho;
        document.getElementById('stat-pas').innerText = a.pas;
        document.getElementById('stat-dri').innerText = a.dri;
        document.getElementById('stat-phy').innerText = a.phy;

        document.getElementById('t-liga').innerText = jogador.titulos.ligas;
        document.getElementById('t-cont').innerText = jogador.titulos.continentais;
        document.getElementById('t-copa').innerText = jogador.titulos.copasMundo;
        document.getElementById('t-bdor').innerText = jogador.titulos.bolasDeOuro;
    }
</script>

</body>
</html>
