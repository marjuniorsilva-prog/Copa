<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Carreira Futebol 2</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; padding: 10px; }
        .card { width: 100%; max-width: 500px; background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #334155; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .stat-box { background: #334155; padding: 10px; border-radius: 8px; font-size: 12px; }
        .val { font-size: 18px; color: #22c55e; font-weight: bold; }
        .offer { background: #15803d; color: white; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; }
        .history { text-align: left; font-size: 14px; margin-top: 15px; background: #020617; padding: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="clube">Iniciando Carreira...</h2>
    <div class="stats" id="stats"></div>
    <div id="game-area">
        <button onclick="iniciar()" id="btn-start" style="padding:15px; width:100%;">START CAREER</button>
    </div>
    <div id="sim-area" style="display:none;">
        <button onclick="simularCiclo()" style="padding:15px; width:100%; background:red; color:white;">SIMULAR PRÓXIMOS 3 ANOS</button>
        <div id="historico" class="history"></div>
    </div>
</div>

<script>
    let p = { age: 15, ovr: 70, club: "Benfica", trophies: 0 };
    const clubs = ["Sevilla", "Tottenham", "Boca Juniors", "Palmeiras", "Al-Nassr", "Milan"];

    function iniciar() {
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('sim-area').style.display = 'block';
        updateStats();
    }

    function simularCiclo() {
        if(p.age >= 39) { alert("Aposentado!"); return; }
        p.age += 3;
        p.ovr += Math.floor(Math.random() * 3);
        
        let gols = Math.floor(Math.random() * 50);
        let titulos = (gols > 30) ? "🏆 Liga" : "-";
        
        document.getElementById('historico').innerHTML += `<p>${p.age} anos: ${p.club} | ${gols} gols | ${titulos}</p>`;
        
        if(Math.random() > 0.5) {
            let novoClube = clubs[Math.floor(Math.random()*clubs.length)];
            document.getElementById('game-area').innerHTML = `<h3>Proposta de: ${novoClube}</h3>
            <button class="offer" onclick="mudarClube('${novoClube}')">Aceitar ${novoClube}</button>
            <button onclick="document.getElementById('game-area').innerHTML=''">Recusar</button>`;
        }
        updateStats();
    }

    function mudarClube(nome) {
        p.club = nome;
        document.getElementById('clube').innerText = "Carreira: " + nome;
        document.getElementById('game-area').innerHTML = `<button onclick="location.reload()">Continuar</button>`;
    }

    function updateStats() {
        document.getElementById('stats').innerHTML = `
            <div class="stat-box">OVR<div class="val">${p.ovr}</div></div>
            <div class="stat-box">SHO<div class="val">${Math.floor(p.ovr*0.9)}</div></div>
            <div class="stat-box">PAC<div class="val">${Math.floor(p.ovr*0.9)}</div></div>
            <div class="stat-box">IDADE<div class="val">${p.age}</div></div>
        `;
    }
</script>
</body>
</html>
