<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Carreira - Versão Definitiva</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 10px; }
        .container { width: 100%; max-width: 800px; background: #1e1e1e; border-radius: 10px; padding: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin: 10px 0; }
        .stat-box { background: #3c3c3c; text-align: center; padding: 5px; border-radius: 4px; font-size: 11px; }
        .stat-value { font-size: 16px; font-weight: bold; color: #00ff88; }
        .history-table { width: 100%; border-collapse: collapse; background: #2d5a27; font-size: 12px; }
        .history-table th { background: #006400; padding: 8px; color: white; }
        .history-table td { padding: 6px; border: 1px solid #4a8a44; text-align: center; }
        .row-age { background: #2c3e50; color: white; font-weight: bold; }
        .btn { background: #ff3e3e; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #transfer-market { display: none; background: #333; padding: 15px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <div id="start-screen">
        <h1>Simulador Lenda ⚽</h1>
        <button class="btn" onclick="iniciarCarreira()">Iniciar Carreira</button>
    </div>

    <div id="main-screen" style="display: none;">
        <div class="stats-grid">
            <div class="stat-box">OVR<div class="stat-value" id="stat-ovr">70</div></div>
            <div class="stat-box">PAC<div class="stat-value" id="stat-pac">0</div></div>
            <div class="stat-box">SHO<div class="stat-value" id="stat-sho">0</div></div>
            <div class="stat-box">PAS<div class="stat-value" id="stat-pas">0</div></div>
            <div class="stat-box">DRI<div class="stat-value" id="stat-dri">0</div></div>
            <div class="stat-box">PHY<div class="stat-value" id="stat-phy">0</div></div>
        </div>

        <table class="history-table">
            <thead>
                <tr><th>Idd</th><th>Clube</th><th>🏟️</th><th>⚽</th><th>👟</th><th>Glórias</th></tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>

        <div id="action-area" style="margin-top: 15px;">
            <button class="btn" onclick="simular()">Simular 3 Anos ⏩</button>
        </div>

        <div id="transfer-market">
            <h3 id="market-msg">Propostas Recebidas:</h3>
            <div id="offers-list"></div>
        </div>
    </div>
</div>

<script>
    let jogador = { idade: 15, clube: null, attr: {}, titulos: 0 };
    let clubes = [
        {nome: "Real Madrid", tier: 1}, {nome: "Man City", tier: 1}, {nome: "Flamengo", tier: 3}, 
        {nome: "Boca", tier: 3}, {nome: "Juventus", tier: 2}, {nome: "River Plate", tier: 3}
    ];

    function iniciarCarreira() {
        jogador.attr = {ovr: 65, pac: 60, sho: 60, pas: 60, dri: 60, phy: 60, pot: aleatorio(80, 95)};
        jogador.clube = clubes[aleatorio(0, clubes.length-1)];
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        atualizarTela();
    }

    function simular() {
        for(let i=0; i<3; i++) {
            jogador.idade++;
            // Lógica de evolução: Se jovem, cresce rápido. Se veterano, perde pouco.
            if(jogador.idade < 30) {
                jogador.attr.sho += aleatorio(1, 3); jogador.attr.pas += aleatorio(1, 2);
                jogador.attr.pac += aleatorio(0, 2);
            } else {
                jogador.attr.pac -= aleatorio(1, 2); jogador.attr.phy -= aleatorio(1, 2);
                // Técnica se mantém!
            }
            // Calcula OVR médio
            jogador.attr.ovr = Math.floor((jogador.attr.pac + jogador.attr.sho + jogador.attr.pas + jogador.attr.dri + jogador.attr.phy)/5);
        }
        renderizarLinha();
        atualizarTela();
        abrirMercado();
    }

    function renderizarLinha() {
        let gols = Math.floor(jogador.attr.sho * 0.8 + aleatorio(-10, 10));
        let body = document.getElementById('history-body');
        body.innerHTML = `<tr><td class="row-age">${jogador.idade}</td><td>${jogador.clube.nome}</td><td>40</td><td>${gols}</td><td>15</td><td>✨</td></tr>` + body.innerHTML;
    }

    function atualizarTela() {
        document.getElementById('stat-ovr').innerText = jogador.attr.ovr;
        document.getElementById('stat-pac').innerText = jogador.attr.pac;
        document.getElementById('stat-sho').innerText = jogador.attr.sho;
        document.getElementById('stat-pas').innerText = jogador.attr.pas;
        document.getElementById('stat-dri').innerText = jogador.attr.dri;
        document.getElementById('stat-phy').innerText = jogador.attr.phy;
    }

    function abrirMercado() {
        document.getElementById('action-area').style.display = 'none';
        document.getElementById('transfer-market').style.display = 'block';
    }
    
    function rejeitarOfertas() { 
        document.getElementById('transfer-market').style.display = 'none';
        document.getElementById('action-area').style.display = 'block';
    }

    function aleatorio(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
</script>
</body>
</html>
