<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: #1e1e1e; border-radius: 10px; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #333; text-align: center; padding: 10px; border-radius: 5px; font-size: 12px; }
        .stat-val { font-size: 18px; font-weight: bold; color: #00ff88; }
        .history-table { width: 100%; border-collapse: collapse; background: #1a3a1a; }
        .history-table th { background: #004400; padding: 10px; }
        .history-table td { padding: 8px; border: 1px solid #336633; text-align: center; }
        .btn { background: #22c55e; color: white; padding: 15px; width: 100%; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div id="player-header">
        <h2 id="ovr-text">OVR: 70 | Atacante</h2>
        <div id="market-val" style="color: #22c55e;">€ 5.0m</div>
    </div>
    <div class="stats-grid">
        <div class="stat-box">OVR<div class="stat-val" id="ovr">70</div></div>
        <div class="stat-box">PAC<div class="stat-val" id="pac">70</div></div>
        <div class="stat-box">SHO<div class="stat-val" id="sho">70</div></div>
        <div class="stat-box">PAS<div class="stat-val" id="pas">70</div></div>
        <div class="stat-box">DRI<div class="stat-val" id="dri">70</div></div>
        <div class="stat-box">PHY<div class="stat-val" id="phy">70</div></div>
    </div>
    <table class="history-table">
        <thead><tr><th>Idd</th><th>Clube (3 Anos)</th><th>🏟️</th><th>⚽</th><th>👟</th><th>Glórias</th></tr></thead>
        <tbody id="history-body"></tbody>
    </table>
    <button class="btn" onclick="simularCarreira()">SIMULAR 3 ANOS ⏩</button>
    <div id="offers" style="margin-top:20px;"></div>
</div>

<script>
    let p = { age: 15, ovr: 70, pac: 70, sho: 70, pas: 70, dri: 70, phy: 70, club: "Real Madrid", titles: 0 };

    function simularCarreira() {
        if (p.age >= 39) { alert("Aposentado!"); return; }
        
        p.age += 3;
        // Evolução/Declínio Realista
        if (p.age < 28) { p.ovr += aleatorio(1, 3); p.sho += aleatorio(1, 2); }
        else if (p.age > 32) { p.ovr -= 1; p.pac -= 2; }
        
        // Simular números (Gols baseados no OVR)
        let jogos = aleatorio(80, 130);
        let gols = Math.floor((p.ovr/100) * jogos * (Math.random() + 0.5));
        let ass = Math.floor((p.pas/100) * jogos * 0.4);
        
        // Atualizar Tabela
        let body = document.getElementById('history-body');
        body.innerHTML = `<tr><td style="background:#4b0082;">${p.age}</td><td>${p.club}</td><td>${jogos}</td><td>${gols}</td><td>${ass}</td><td>🏆</td></tr>` + body.innerHTML;
        
        atualizarUI();
        gerarOfertas(gols);
    }

    function gerarOfertas(gols) {
        let offerDiv = document.getElementById('offers');
        offerDiv.innerHTML = gols > 20 ? "<h3>Propostas:</h3><button class='btn' onclick='transferir()'>Chelsea (€80m)</button>" : "<h3>Sem propostas.</h3>";
    }

    function transferir() { p.club = "Chelsea"; alert("Transferido!"); }

    function atualizarUI() {
        document.getElementById('ovr').innerText = p.ovr;
        document.getElementById('ovr-text').innerText = `OVR: ${p.ovr} | Atacante`;
        document.getElementById('pac').innerText = p.pac;
        document.getElementById('sho').innerText = p.sho;
        document.getElementById('pas').innerText = p.pas;
        document.getElementById('dri').innerText = p.dri;
        document.getElementById('phy').innerText = p.phy;
    }
    
    function aleatorio(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
</script>
</body>
</html>
