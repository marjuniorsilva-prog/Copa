        // VARIÁVEIS GLOBAIS que seu jogo usa
        window.eliteClubs = [];
        window.tierPrata = [];
        window.tierBronze = [];
        window.bancoDramasOriginal = [];

        async function carregarDados() {
            // 1. Carrega Times
            const timesSnap = await getDocs(collection(db, "times"));
            timesSnap.forEach(doc => {
                let t = doc.data();
                if(t.categoria === "Elite") window.eliteClubs.push(t.nome);
                else if(t.categoria === "Prata") window.tierPrata.push(t.nome);
                else window.tierBronze.push(t.nome);
            });

            // 2. Carrega Dramas e RECONSTRÓI A LÓGICA (Ponte)
            const dramasSnap = await getDocs(collection(db, "eventos"));
            dramasSnap.forEach(doc => {
                let d = doc.data();
                // Aqui recriamos a função 'acao' que o Firebase removeu
                d.acao = (opt) => {
                    // Esta lógica deve ser o espelho da sua lógica original
                    // Exemplo para o drama 01:
                    if(d.id === "drama_01") {
                        if(opt==='A'){ p.emocao="Ressaca 🥴"; p.phy-=2; p.fama+=100000; return "Ficou de ressaca!"; }
                        // ... adicione a lógica dos outros dramas aqui ...
                    }
                };
                window.bancoDramasOriginal.push(d);
            });
            
            console.log("Sistema pronto!");
            document.getElementById('btn-main').innerText = "INICIAR CARREIRA";
            document.getElementById('btn-main').disabled = false;
        }

        carregarDados();
    </script>
