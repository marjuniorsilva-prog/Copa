<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador Carreira PRO</title>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 950px; background: #1e293b; padding: 20px; border-radius: 12px; }
        .grid-stats { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #334155; text-align: center; padding: 10px; border-radius: 6px; }
        .stat-num { font-size: 20px; font-weight: bold; color: #22c55e; }
        table { width: 100%; border-collapse: collapse; background: #020617; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }
        .btn { background: #ef4444; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        .offer-card { background: #15803d; color: white; padding: 10px; margin: 5px; cursor: pointer; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <h2 id="club-display">Carreira: Iniciando...</h2>
    <div class="grid-stats" id="stats-ui"></div>
    <table>
        <thead><tr><th>Idd</th><th>Clube</th><th>🏟️</th><th>⚽</th><th>👟</th><th>Glórias</th></tr></thead>
        <tbody id="history"></tbody>
    </table>
    <button class="btn" style="margin-top:20px;" onclick="simularCiclo()">SIMULAR 3 ANOS ⏩</button>
    <div id="market" style="display:none; margin-top:20px;">
        <h3>Propostas de Transferência:</h3>
        <div id="offer-list"></div>
    </div>
</div>

<script>
    let p = { age: 15, ovr: 70, pac: 70, sho: 70, pas: 60, dri: 80, def: 50, phy: 70, club: "Benfica", continent: "S. America" };
    const clubs = ["Real Madrid", "Man City", "PSG", "Bayern", "Flamengo", "Arsenal", "Milan", "Al-Nassr"];

    function simularCiclo() {
        if(p.age >= 39) return;
        p.age += 3;

        // Performance dependente do OVR
        let jogos = 100; // Constante como no seu print
        let gols = Math.floor((p.ovr/80) * 50 + aleatorio(-10, 10));
        let pass = Math.floor((p.pas/80) * 20 + aleatorio(-5, 5));

        // Títulos Inteligentes (Lógica de probabilidade)
        let titulos = [];
        let chanceLiga = (p.ovr/100);
        if(Math.random() < chanceLiga) titulos.push("Liga");
        if(Math.random() < (chanceLiga - 0.2)) titulos.push("Champions");
        if(p.age % 4 === 0 && p.ovr > 85) titulos.push("Copa do Mundo");
        
        let glorias = titulos.length > 0 ? titulos.join(" + ") : "-";

        let body = document.getElementById('history');
        body.innerHTML = `<tr><td>${p.age}</td><td>${p.club}</td><td>${jogos}</td><td>${gols}</td><td>${pass}</td><td>${glorias}</td></tr>` + body.innerHTML;

        // Evolução/Declínio gradual
        if(p.age < 30) p.ovr += aleatorio(0, 2);
        else p.ovr -= aleatorio(0, 1);
        
        updateUI();
        mostrarOfertas(gols);
    }

    function mostrarOfertas(gols) {
        let area = document.getElementById('market');
        let list = document.getElementById('offer-list');
        list.innerHTML = "";
        
        let num = (gols > 30) ? aleatorio(1, 3) : aleatorio(0, 1);
        if(num === 0) { area.style.display = 'none'; return; }
        
        area.style.display = 'block';
        for(let i=0; i<num; i++) {
            let c = clubs[aleatorio(0, clubs.length-1)];
            list.innerHTML += `<button class='offer-btn' onclick="mudarClube('${c}')">${c} (€${aleatorio(20, 150)}m)</button>`;
        }
    }

    function mudarClube(c) { p.club = c; document.getElementById('club-display').innerText = "Carreira: " + c; document.getElementById('market').style.display = 'none'; }

    function updateUI() {
        document.getElementById('stats-ui').innerHTML = ['OVR','PAC','SHO','PAS','DRI','DEF','PHY'].map(s => 
            `<div class='stat-card'>${s}<div class='stat-num'>${p[s.toLowerCase()]}</div></div>`).join('');
    }
    
    function aleatorio(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    updateUI();
</script>
</body>
</html>
