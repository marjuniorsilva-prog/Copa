<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Carga</title>
</head>
<body style="background: #111; color: white; padding: 20px;">
    <h1>O código está funcionando!</h1>
    <div id="status">Conectando ao Firebase...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        
        try {
            console.log("Iniciando Firebase...");
            document.getElementById('status').innerText = "Firebase importado com sucesso.";
        } catch(e) {
            document.getElementById('status').innerText = "Erro: " + e.message;
        }
    </script>
</body>
</html>
