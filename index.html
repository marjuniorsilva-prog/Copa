<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Carreira Profissional</title>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: #1e293b; padding: 20px; border-radius: 12px; }
        .grid-stats { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin: 20px 0; }
        .stat-card { background: #334155; text-align: center; padding: 10px; border-radius: 6px; font-size: 11px; }
        .stat-val { font-size: 16px; color: #22c55e; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: #020617; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }
        .btn { background: #ef4444; color: white; padding: 15px; border: none; width: 100%; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .offer { background: #15803d; margin: 5px 0; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="titulo-carreira">Carreira: Iniciante</h2>
    <div class="grid-stats" id="stats-area"></div>
    
    <table>
        <thead><tr><th>Idd</th><th>Clube</th><th>🏟️</th><th>⚽</th><th>👟</th><th>Glórias</th></tr></thead>
        <tbody id="historia"></tbody>
    </table>

    <button class="btn" onclick="simular()">AVANÇAR 3 ANOS ⏩</button>
    <div id="mercado" style="display:none; margin-top:20px;"></div>
</div>

<script>
    let p = { age: 15, ovr: 70, pac: 70, sho: 70, pas: 70, dri: 70, def: 60, phy: 70, club: "Clube Base", totalG: 0, totalA: 0 };
    const ligas = ["Real Madrid", "Man City", "PSG", "Bayern", "Flamengo", "Al-Hilal", "Inter Miami"];

    function simular() {
        if(p.age >= 39) { alert("Aposentado!"); return; }
        p.age += 3;
        
        // Performance
        let gols = Math.floor((p.ovr/80) * 40 + Math.random() * 20);
        let pass = Math.floor((p.pas/80) * 15 + Math.random() * 10);
        p.totalG += gols; p.totalA += pass;

        // Glórias
        let gloria = "";
        if(gols > 30) gloria = "🏆 Liga";
        if(gols > 45) gloria = "🏆 Champions";
        if(p.age % 4 === 0 && p.ovr > 88) gloria = "🌍 Copa do Mundo + ⚽ Bola de Ouro";

        document.getElementById('historia').innerHTML = `<tr><td>${p.age}</td><td>${p.club}</td><td>110</td><td>${p.totalG}</td><td>${p.totalA}</td><td>${gloria}</td></tr>` + document.getElementById('historia').innerHTML;

        // Evolução
        if(p.age < 30) p.ovr += 1; else p.ovr -= 1;
        updateUI();
        gerarMercado();
    }

    function gerarMercado() {
        let m = document.getElementById('mercado');
        m.style.display = 'block';
        m.innerHTML = "<h3>Propostas:</h3>";
        for(let i=0; i<3; i++) {
            let c = ligas[Math.floor(Math.random()*ligas.length)];
            m.innerHTML += `<div class='offer' onclick="trans('${c}')">${c} - Valor: €${Math.floor(Math.random()*150)}M</div>`;
        }
    }

    function trans(c) { p.club = c; document.getElementById('titulo-carreira').innerText = "Carreira: " + c; }

    function updateUI() {
        document.getElementById('stats-area').innerHTML = `
            ${['OVR','PAC','SHO','PAS','DRI','DEF','PHY'].map(s => `<div class='stat-card'>${s}<div class='stat-val'>${p[s.toLowerCase()]}</div></div>`).join('')}
        `;
    }
    updateUI();
</script>
</body>
</html>
